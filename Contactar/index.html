<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cotización Oficial - CStyles</title>
    <style>
        :root { --azul-cstyles: #2a75bb; --wa-green: #25d366; }
        
        body {
            background: linear-gradient(180deg, #000000 0%, #1a1c1e 100%);
            background-attachment: fixed;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            min-height: 100vh;
        }

        .nav-cotizar {
            width: 100%; height: 70px; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-cotizar a { color: var(--azul-cstyles); text-decoration: none; font-weight: 900; letter-spacing: 3px; }

        .contenedor-principal { max-width: 800px; margin: 60px auto; padding: 0 20px; text-align: center; }

        .header-seccion h1 { font-size: 2rem; letter-spacing: 5px; font-weight: 900; color: var(--azul-cstyles); text-transform: uppercase; margin-bottom: 10px; }
        .header-seccion p { color: #888; margin-bottom: 40px; font-size: 0.9rem; }

        .tarjeta-formulario {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px; padding: 40px; backdrop-filter: blur(10px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .grupo-input { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

        input, select {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; color: #fff; font-size: 0.9rem; outline: none; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--azul-cstyles); background: rgba(0,0,0,0.8); }

        /* Estilo especial para el select para que no se vea el fondo blanco */
        select option { background: #1a1c1e; color: #fff; }

        .zona-carga-foto {
            border: 2px dashed rgba(42, 117, 187, 0.3); padding: 30px; border-radius: 20px;
            margin: 20px 0 30px; cursor: pointer; transition: 0.3s;
        }
        .zona-carga-foto:hover { background: rgba(42, 117, 187, 0.05); border-color: var(--azul-cstyles); }
        .zona-carga-foto span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        .btn-enviar {
            width: 100%; background: var(--azul-cstyles); color: white; border: none;
            padding: 20px; border-radius: 15px; font-size: 1rem; font-weight: 900;
            letter-spacing: 2px; cursor: pointer; transition: 0.4s; text-transform: uppercase;
        }
        .btn-enviar:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(42, 117, 187, 0.4); }

        @media (max-width: 600px) { .grupo-input { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="nav-cotizar"><a href="/">CSTYLES</a></nav>

    <main class="contenedor-principal">
        <div class="header-seccion">
            <h1>Cotización Oficial</h1>
            <p>Selecciona tu diseño y envíanos la foto de tu butaca para confirmar</p>
        </div>

        <div class="tarjeta-formulario">
            <form id="formCstyles">
                <div class="grupo-input">
                    <input type="text" id="nombre" placeholder="Tu Nombre" required>
                    <input type="tel" id="telefono" placeholder="WhatsApp" required>
                </div>

                <div class="grupo-input">
                    <input type="text" id="auto" placeholder="Modelo y Año del Auto" required>
                    
                    <!-- MENU DESPLEGABLE PARA EVITAR BROMAS -->
                    <select id="codigo" required>
                        <option value="" disabled selected>Selecciona un Diseño</option>
                        <optgroup label="LÍNEA BICOLOR">
                            <option value="BI-01">Bicolor BI-01</option>
                            <option value="BI-02">Bicolor BI-02</option>
                            <option value="BI-03">Bicolor BI-03</option>
                            <option value="BI-04">Bicolor BI-04</option>
                            <option value="BI-05">Bicolor BI-05</option>
                        </optgroup>
                        <optgroup label="OTRAS LÍNEAS">
                            <option value="Clásico">Diseño Clásico</option>
                            <option value="Tela Automotriz">Tela Automotriz</option>
                            <option value="Personalizado Especial">Personalizado Especial</option>
                        </optgroup>
                    </select>
                </div>

                <div class="zona-carga-foto" onclick="document.getElementById('inputFoto').click()">
                    <span>📸</span>
                    <p id="textoFoto">Toca para seleccionar foto de tu asiento</p>
                    <input type="file" id="inputFoto" accept="image/*" style="display:none" onchange="actualizarTexto()">
                </div>

                <button type="submit" class="btn-enviar">Enviar a WhatsApp 🚀</button>
            </form>
        </div>
    </main>

    <script>
        function actualizarTexto() {
            const input = document.getElementById('inputFoto');
            const texto = document.getElementById('textoFoto');
            if (input.files.length > 0) {
                texto.innerText = "✅ Foto cargada correctamente";
                texto.style.color = "#25d366";
            }
        }

        document.getElementById('formCstyles').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nom = document.getElementById('nombre').value;
            const tel = document.getElementById('telefono').value;
            const aut = document.getElementById('auto').value;
            const cod = document.getElementById('codigo').value;
            
            const msg = encodeURIComponent(
                `*SOLICITUD DE COTIZACIÓN CStyles*%0A%0A` +
                `👤 *Cliente:* ${nom}%0A` +
                `📱 *WhatsApp:* ${tel}%0A` +
                `🚗 *Auto:* ${aut}%0A` +
                `🎨 *Modelo Elegido:* ${cod}%0A%0A` +
                `_Te envío la foto de mi butaca para validar la plantilla._`
            );
            
            // CORRECCIÓN FINAL DEL ENLACE
            window.open(`https://wa.me{msg}`, '_blank');
        });
    </script>
</body>
</html>
