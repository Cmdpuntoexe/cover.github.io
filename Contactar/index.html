<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotización</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
  padding: 20px;
}

form {
  max-width: 500px;
  margin: auto;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
}

h2 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 12px;
  background: #00c853;
  color: #fff;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #00a844;
}
</style>

</head>
<body>

<form action="https://api.web3forms.com/submit" method="POST" enctype="multipart/form-data">

  <!-- TU ACCESS KEY YA PUESTA -->
  <input type="hidden" name="access_key" value="0318e171-2b9a-481a-8648-9ca0a0de109a">

  <h2>Solicitar Cotización</h2>

  <input type="text" name="nombre" placeholder="Nombre completo" required>

  <input type="text" name="contacto" placeholder="Teléfono o correo" required>

  <input type="text" name="auto" placeholder="Marca, modelo y año del vehículo" required>

  <textarea name="detalle" placeholder="Ejemplo: 1 negro / 2 rojo / costura blanca"></textarea>

  <label>Subir imagen del asiento</label>
  <input type="file" name="archivo" accept="image/*" required>

  <button type="submit">Enviar cotización</button>

</form>

</body>
</html>
