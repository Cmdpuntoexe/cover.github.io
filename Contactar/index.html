<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cotización Oficial - Covering Styles</title>
    <style>
        :root { --azul-cstyles: #2a75bb; --wa-green: #25d366; }
        
        body {
            background: linear-gradient(180deg, #000000 0%, #1a1c1e 100%);
            background-attachment: fixed;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-cotizar {
            width: 100%; height: 70px; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-cotizar a { color: var(--azul-cstyles); text-decoration: none; font-weight: 900; letter-spacing: 3px; font-size: 1.2rem; }

        .contenedor-principal { max-width: 500px; width: 90%; margin: 50px auto; text-align: center; }

        .tarjeta-formulario {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px; padding: 40px; backdrop-filter: blur(10px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        input, select {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; color: #fff; font-size: 0.9rem; outline: none; transition: 0.3s;
            width: 100%; box-sizing: border-box; margin-bottom: 20px;
        }
        input:focus, select:focus { border-color: var(--azul-cstyles); background: rgba(0,0,0,0.8); }

        /* Estilos de la miniatura */
        #contenedor-preview {
            display: none;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }
        #img-preview {
            width: 100%;
            max-width: 220px;
            border-radius: 15px;
            border: 2px solid var(--azul-cstyles);
            box-shadow: 0 10px 30px rgba(42, 117, 187, 0.3);
        }

        .btn-enviar {
            width: 100%; background: var(--wa-green); color: white; border: none;
            padding: 20px; border-radius: 50px; font-size: 1rem; font-weight: 900;
            letter-spacing: 2px; cursor: pointer; transition: 0.4s; text-transform: uppercase;
        }
        .btn-enviar:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3); background: #1ebd59; }

        .referencia-preview {
            background: rgba(42, 117, 187, 0.1); padding: 15px; border-radius: 12px;
            margin-bottom: 20px; font-size: 0.75rem; color: #888; word-break: break-all;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-inicio-flotante {
            position: fixed; bottom: 30px; left: 30px;
            background: rgba(0, 0, 0, 0.6); border: 1px solid var(--azul-cstyles);
            backdrop-filter: blur(10px); color: white; text-decoration: none;
            padding: 12px 20px; border-radius: 50px; display: flex; align-items: center; gap: 10px;
            z-index: 1000; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <nav class="nav-cotizar"><a href="/">CSTYLES</a></nav>

    <main class="contenedor-principal">
        <h1 style="color: var(--azul-cstyles); font-weight: 900; letter-spacing: 3px; font-size: 1.8rem;">SOLICITUD DE DISEÑO</h1>
        <p style="color: #666; font-size: 0.85rem; margin-bottom: 30px;">Recibirás respuesta inmediata en tu WhatsApp</p>

        <div class="tarjeta-formulario">
            <input type="text" id="nombre" placeholder="Tu Nombre" required>
            <input type="text" id="auto" placeholder="Vehículo y Año (Ej: Aveo 2015)" required>
            
            <select id="modelo" onchange="actualizarLinkVisual()" required>
                <option value="" disabled selected>Selecciona el Diseño</option>
                <option value="dp1.jpg">Personalizados</option>
                <option value="clasico1.jpg">Diseño Clásico</option>
                <option value="Misxto2.jpg">Tela Automotriz</option>
                <option value="bicolor1.png">Diseño Bicolor</option>
            </select>

            <!-- VISTA PREVIA DE IMAGEN -->
            <div id="contenedor-preview">
                <p style="font-size: 0.7rem; color: #888; margin-bottom: 10px; text-transform: uppercase;">Vista previa:</p>
                <img id="img-preview" src="" alt="Cargando diseño...">
            </div>

            <div class="referencia-preview">
                <strong>Link de Referencia:</strong><br>
                <span id="txtLink">Selecciona un modelo...</span>
            </div>

            <button type="button" onclick="enviarWhatsApp()" class="btn-enviar">ENVIAR A WHATSAPP 📱</button>
        </div>
    </main>

    <script>
        function actualizarLinkVisual() {
            const modelo = document.getElementById('modelo').value;
            const txtLink = document.getElementById('txtLink');
            const contenedorPreview = document.getElementById('contenedor-preview');
            const imgPreview = document.getElementById('img-preview');

            if (modelo) {
                const urlCompleta = `https://fundascs.com{modelo}`;
                txtLink.innerText = urlCompleta;
                txtLink.style.color = "#2a75bb";
                
                // Actualizar y mostrar la imagen
                imgPreview.src = `/${modelo}`;
                contenedorPreview.style.display = "block";
            }
        }

        function enviarWhatsApp() {
            const nombre = document.getElementById('nombre').value;
            const auto = document.getElementById('auto').value;
            const modeloSelect = document.getElementById('modelo');
            const modeloArchivo = modeloSelect.value;
            const modeloNombre = modeloSelect.options[modeloSelect.selectedIndex].text;

            if(!nombre || !auto || !modeloArchivo) {
                alert("Por favor, completa todos los campos antes de enviar.");
                return;
            }

            const urlFoto = `https://fundascs.com{modeloArchivo}`;
            const numeroTel = "569XXXXXXXX"; // <-- REEMPLAZA CON TU NÚMERO AQUÍ

            const textoMensaje = `*NUEVA COTIZACIÓN CStyles*\n\n` +
                                 `👤 *Nombre:* ${nombre}\n` +
                                 `🚗 *Vehículo:* ${auto}\n` +
                                 `🎨 *Diseño:* ${modeloNombre}\n\n` +
                                 `🖼️ *Referencia:* ${urlFoto}`;

            window.open(`https://wa.me{numeroTel}?text=${encodeURIComponent(textoMensaje)}`, '_blank');
        }
    </script>

    <a href="https://fundascs.com" class="btn-inicio-flotante">
        <span>🏠</span><span style="font-size: 0.7rem; font-weight: 900; letter-spacing: 2px;">CStyles</span>
    </a>

</body>
</html>
