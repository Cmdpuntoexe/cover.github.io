<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizar - Covering Styles</title>
    <style>
        :root { --azul: #2a75bb; --wa: #25d366; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        .nav { padding: 20px; border-bottom: 1px solid #333; font-weight: 900; letter-spacing: 3px; color: var(--azul); }
        .tarjeta { 
            max-width: 450px; margin: 50px auto; padding: 30px; 
            background: #111; border-radius: 25px; border: 1px solid #333;
        }
        input, select { 
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; 
            background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box; outline: none;
        }
        .btn-wa { 
            width: 100%; padding: 18px; background: var(--wa); color: #fff; 
            border: none; border-radius: 50px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s;
        }
        .referencia-preview { font-size: 0.7rem; color: #555; margin-bottom: 20px; word-break: break-all; }
    </style>
</head>
<body>

    <div class="nav">CSTYLES</div>

    <div class="tarjeta">
        <h2 style="color: var(--azul); letter-spacing: 2px;">COTIZACIÓN RÁPIDA</h2>
        <p style="color: #888; font-size: 0.85rem; margin-bottom: 30px;">Recibirás la respuesta en tu WhatsApp</p>

        <form id="formCstyles">
            <input type="text" id="nombre" placeholder="Tu Nombre" required>
            <input type="text" id="auto" placeholder="Vehículo y Año" required>
            
            <select id="modelo" onchange="mostrarRuta()" required>
                <option value="" disabled selected>Selecciona un Diseño</option>
                <!-- Usamos nombres sin espacios para las rutas de las fotos -->
                <option value="bicolor1.png">Bicolor BI-01</option>
                <option value="bicolor2.png">Bicolor BI-02</option>
                <option value="2Bicolor.jpg">Bicolor BI-03</option>
                <option value="clasico1.jpg">Diseño Clásico</option>
            </select>

            <div class="referencia-preview" id="previewRuta">Link de referencia aparecerá aquí</div>

            <button type="button" onclick="enviarWA()" class="btn-wa">Enviar a WhatsApp 📱</button>
        </form>
    </div>

    <script>
        function mostrarRuta() {
            const modelo = document.getElementById('modelo').value;
            const preview = document.getElementById('previewRuta');
            preview.innerText = `Referencia: https://fundascs.com{modelo}`;
        }

        function enviarWA() {
            const nombre = document.getElementById('nombre').value;
            const auto = document.getElementById('auto').value;
            const modelo = document.getElementById('modelo').value;

            if(!nombre || !auto || !modelo) {
                alert("Por favor, completa los campos.");
                return;
            }

            // URL de la foto sin espacios
            const urlFoto = `https://fundascs.com{modelo}`;

            // Construimos el mensaje usando %20 para reemplazar los espacios
            // Así la URL de WhatsApp nunca se rompe
            const mensaje = encodeURIComponent(
                `*SOLICITUD%20DE%20COTIZACIÓN%20CStyles*%0A%0A` +
                `👤%20*Nombre:*%20${nombre}%0A` +
                `🚗%20*Auto:*%20${auto}%0A` +
                `🎨%20*Diseño:*%20${modelo}%0A%0A` +
                `🖼️%20*Ver%20Foto:*%20${urlFoto}`
            );

            window.open(`https://wa.me{mensaje}`, '_blank');
        }
    </script>
</body>
</html>
