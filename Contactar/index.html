<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotización Técnica - CStyles</title>
    <style>
        :root { --azul: #2a75bb; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        .nav { padding: 20px; border-bottom: 1px solid #333; font-weight: 900; letter-spacing: 3px; color: var(--azul); }
        .tarjeta { 
            max-width: 500px; margin: 50px auto; padding: 35px; 
            background: #111; border-radius: 25px; border: 1px solid #333;
        }
        input, select { 
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; 
            background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box;
        }
        .btn-enviar { 
            width: 100%; padding: 18px; background: var(--azul); color: #fff; 
            border: none; border-radius: 50px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-enviar:hover { transform: scale(1.02); background: #1e5a91; }
        .foto-preview { 
            background: rgba(42, 117, 187, 0.1); padding: 15px; 
            border-radius: 12px; margin-bottom: 20px; font-size: 0.8rem; color: #888;
        }
    </style>
</head>
<body>

    <div class="nav">CSTYLES</div>

    <div class="tarjeta">
        <h2 style="letter-spacing: 2px;">SOLICITUD DE DISEÑO</h2>
        <p style="color: #666; font-size: 0.85rem; margin-bottom: 30px;">Recibirás la confirmación en tu correo electrónico</p>

        <form action="https://web3forms.com" method="POST">
            
            <input type="hidden" name="access_key" value="0318e171-2b9a-481a-8648-9ca0a0de109a">
            <input type="hidden" name="subject" value="Nueva Cotización con Referencia de Imagen">

            <input type="text" name="Nombre_Cliente" placeholder="Tu Nombre" required>
            <input type="tel" name="WhatsApp" placeholder="WhatsApp de contacto" required>
            <input type="text" name="Vehiculo" placeholder="Modelo y Año del Auto" required>
            
            <select name="Modelo_Elegido" id="modeloSelect" onchange="actualizarLink()" required>
                <option value="" disabled selected>Selecciona el Diseño</option>
                <option value="BI-01">Bicolor BI-01</option>
                <option value="BI-02">Bicolor BI-02</option>
                <option value="BI-03">Bicolor BI-03</option>
                <option value="Clasico">Diseño Clásico</option>
            </select>

            <!-- CAMPO OCULTO QUE ENVÍA EL LINK DE LA FOTO -->
            <input type="hidden" name="Link_Referencia_Foto" id="inputLink">

            <div class="foto-preview">
                <strong>Referencia:</strong> <span id="txtLink">Selecciona un modelo para ver el link</span>
            </div>

            <button type="submit" class="btn-enviar">Enviar Solicitud 🚀</button>
        </form>
    </div>

<script>
    function actualizarLink() {
        const select = document.getElementById('modeloSelect');
        const modeloCod = select.value; // Esto tomará "BI-01", "BI-03", etc.
        const inputLink = document.getElementById('inputLink');
        const txtLink = document.getElementById('txtLink');
        
        // Ajusta la extensión (.png o .jpg) según como tengas tus fotos en el servidor
        const urlCompleta = `https://fundascs.com{modeloCod}.png`;
        
        inputLink.value = urlCompleta;
        txtLink.innerText = urlCompleta;
        txtLink.style.color = "#2a75bb";
    }
</script>
>
</body>
</html>
