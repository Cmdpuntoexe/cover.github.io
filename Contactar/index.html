<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diseños Especiales - CStyles</title>
    <style>
        :root { --azul-cstyles: #2a75bb; --wa-green: #25d366; --gold: #d4af37; }
        html { scroll-behavior: smooth; }
        body {
            background: linear-gradient(180deg, #000000 0%, #1a1a1a 100%);
            background-attachment: fixed; margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif; color: #ffffff;
            min-height: 100vh;
        }

        /* NAVEGACIÓN */
        .nav-principal {
            width: 100%; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto;
            display: flex; justify-content: space-between;
            align-items: center; padding: 15px 20px;
        }
        .nav-links a {
            color: #fff; text-decoration: none; margin-left: 20px;
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s; opacity: 0.7;
        }
        .nav-links a.active { opacity: 1; color: var(--azul-cstyles); }

        /* TARJETA GLASSMORPHISM */
        .tarjeta-detalle {
            display: flex; width: 95%; max-width: 1100px; 
            min-height: 85vh; margin: 40px auto;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden; backdrop-filter: blur(15px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .seccion-info {
            flex: 1; padding: 45px; display: flex; flex-direction: column;
            background: rgba(0, 0, 0, 0.25); border-right: 1px solid rgba(255,255,255,0.05);
            align-items: center; text-align: center; justify-content: center;
        }
        
        .seccion-form { flex: 1.2; padding: 40px; display: flex; flex-direction: column; justify-content: center; }

        label { display: block; text-align: left; font-size: 0.7rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        
        input, textarea {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; color: #fff; font-size: 0.9rem; outline: none; transition: 0.3s;
            width: 100%; box-sizing: border-box; margin-bottom: 15px; font-family: inherit;
        }
        input:focus, textarea:focus { border-color: var(--azul-cstyles); background: rgba(0,0,0,0.8); }

        .zona-foto {
            background: rgba(255,255,255,0.02); border: 2px dashed rgba(42, 117, 187, 0.4);
            padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center;
        }

        .btn-enviar {
            width: 100%; background: var(--wa-green); color: white; border: none;
            padding: 20px; border-radius: 50px; font-size: 1rem; font-weight: 900;
            letter-spacing: 2px; cursor: pointer; transition: 0.4s; text-transform: uppercase;
        }
        .btn-enviar:hover { transform: translateY(-3px); background: #1ebd59; }

        @media (max-width: 900px) {
            .tarjeta-detalle { flex-direction: column; height: auto; }
            .seccion-info { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
        }
    </style>
</head>
<body>

<nav class="nav-principal">
    <div class="nav-container">
        <a href="/" style="color: var(--azul-cstyles); text-decoration: none; font-weight: 900; letter-spacing: 3px;">CSTYLES</a>
        <div class="nav-links">
            <a href="/clasico/">Clásico</a>
            <a href="/tela-automotriz/">Telas</a>
            <a href="/bicolor/">Bicolor</a>
            <a href="/personalizados/" class="active">Personalizados</a>
        </div>
    </div>
</nav>

<div class="tarjeta-detalle">
    <div class="seccion-info">
        <div style="letter-spacing: 4px; color: var(--gold); font-size: 0.6rem; font-weight: bold; margin-bottom: 10px;">DISEÑOS ESPECIALES</div>
        <h1 style="font-size: 1.8rem; font-weight: 900; margin: 0 0 20px 0; letter-spacing: 2px;">TU DISEÑO, NUESTRA PASIÓN</h1>
        <p style="color: #b8b8b8; font-size: 0.85rem; line-height: 1.6; max-width: 320px;">
            Sube la imagen del estilo que buscas. En CStyles personalizamos cada detalle para que tu vehículo sea único.
        </p>
    </div>

    <div class="seccion-form">
        <!-- URL CORRECTA CONFIRMADA -->
        <form action="https://forminit.com/f/udfbfzb4jfl" method="POST" enctype="multipart/form-data">
            
            <label>Nombre Completo</label>
            <input type="text" name="fi-sender-fullName" placeholder="Tu nombre" required />
            
            <label>Email de contacto</label>
            <input type="email" name="fi-sender-email" placeholder="tu@correo.com" required />
            
            <label>Teléfono</label>
            <input type="tel" name="fi-sender-phone" placeholder="+569..." />

            <label style="color: var(--gold);">📸 SUBIR IMAGEN DE REFERENCIA</label>
            <div class="zona-foto">
                <input type="file" name="fi-file-referencia" accept="image/*" style="border: none; background: transparent; padding: 0; margin-bottom: 0; font-size: 0.8rem; cursor: pointer;">
                <p style="font-size: 0.6rem; color: #555; margin-top: 10px;">FORMATO: JPG / PNG (MÁX 25MB)</p>
            </div>

            <label>Mensaje Adicional</label>
            <textarea name="fi-text-your-message" rows="3" placeholder="Indica modelo de auto y detalles..." required style="resize: none;"></textarea>

            <button type="submit" class="btn-enviar">ENVIAR DISEÑO 📧</button>
        </form>
        <form action="https://forminit.com" method="POST" enctype="multipart/form-data">
    
    <!-- REDIRECCIÓN AUTOMÁTICA -->
    <input type="hidden" name="fi-redirect" value="https://fundascs.com">
    
    <!-- El resto de tus campos (Nombre, Email, Foto, etc.) -->

    </div>
</div>

</body>
</html>
