<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cotización Oficial - Covering Styles</title>
    <style>
        :root { 
            --azul-cstyles: #2a75bb; 
            --wa-green: #25d366; 
            --dark-card: rgba(255, 255, 255, 0.03);
            --gold: #d4af37;
        }
        
        body {
            background: linear-gradient(180deg, #000000 0%, #1a1c1e 100%);
            background-attachment: fixed;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            overflow-y: auto; 
        }

        /* BARRA DE NAVEGACIÓN */
        .nav-cotizar {
            width: 100%; height: 70px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-cotizar a {
            color: var(--azul-cstyles); text-decoration: none;
            font-weight: 900; letter-spacing: 3px; font-size: 1.2rem;
            transition: 0.3s;
        }
        .nav-cotizar a:hover { filter: brightness(1.2); }

        /* CONTENEDOR PRINCIPAL */
        .contenedor-principal {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }

        .header-seccion h1 {
            font-size: 2.2rem; letter-spacing: 5px; font-weight: 900;
            color: var(--azul-cstyles); text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(42, 117, 187, 0.4);
        }
        .header-seccion p { color: #888; margin-bottom: 40px; font-size: 0.9rem; }

        /* FORMULARIO */
        .tarjeta-formulario {
            background: var(--dark-card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 40px;
            backdrop-filter: blur(15px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .grupo-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        input, select {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus, select:focus { border-color: var(--azul-cstyles); background: rgba(0,0,0,0.7); }
        select option { background: #1a1c1e; color: #fff; }

        /* SECCIÓN CARGA DE FOTO */
        .zona-carga-foto {
            border: 2px dashed rgba(42, 117, 187, 0.3);
            padding: 30px;
            border-radius: 20px;
            margin: 20px 0 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .zona-carga-foto:hover { 
            background: rgba(42, 117, 187, 0.05); 
            border-color: var(--azul-cstyles);
        }
        .zona-carga-foto span { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .zona-carga-foto p { margin: 0; font-weight: bold; font-size: 0.9rem; }
        .zona-carga-foto small { color: #555; display: block; margin-top: 5px; }

        /* BOTÓN DE ENVÍO */
        .btn-enviar {
            width: 100%;
            background: var(--azul-cstyles);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }
        .btn-enviar:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(42, 117, 187, 0.4);
            filter: brightness(1.1);
        }

        @media (max-width: 600px) {
            .grupo-input { grid-template-columns: 1fr; gap: 15px; }
            .header-seccion h1 { font-size: 1.6rem; }
            .tarjeta-formulario { padding: 25px; }
        }
    </style>
</head>
<body>

    <nav class="nav-cotizar">
        <a href="/">CSTYLES</a>
    </nav>

    <main class="contenedor-principal">
        <div class="header-seccion">
            <h1>Cotización Oficial</h1>
            <p>Envíanos los detalles para confirmar la plantilla exacta de tu vehículo</p>
        </div>

        <div class="tarjeta-formulario">
            <!-- Formulario conectado a tu ID de Forminit -->
            <form action="https://forminit.com" method="POST" enctype="multipart/form-data">
                
                <div class="grupo-input">
                    <input type="text" name="Nombre_Completo" placeholder="Tu Nombre" required>
                    <input type="tel" name="WhatsApp" placeholder="WhatsApp de Contacto" required>
                </div>

                <div class="grupo-input">
                    <input type="text" name="Vehiculo" placeholder="Modelo y Año del Auto" required>
                    
                    <select name="Diseno_Elegido" required>
                        <option value="" disabled selected>Selecciona un Diseño</option>
                        <optgroup label="LÍNEA BICOLOR">
                            <option value="BI-01">Bicolor BI-01</option>
                            <option value="BI-02">Bicolor BI-02</option>
                            <option value="BI-03">Bicolor BI-03</option>
                            <option value="BI-04">Bicolor BI-04</option>
                            <option value="BI-05">Bicolor BI-05</option>
                        </optgroup>
                        <optgroup label="OTRAS LÍNEAS">
                            <option value="Clasico">Diseño Clásico</option>
                            <option value="Tela Automotriz">Tela Automotriz</option>
                            <option value="Personalizado Especial">Personalizado Especial</option>
                        </optgroup>
                    </select>
                </div>

                <div class="zona-carga-foto" onclick="document.getElementById('archivo').click()">
                    <span>📸</span>
                    <p id="info-archivo">Subir foto de tus asientos actuales</p>
                    <small>Necesario para validar la forma de la butaca</small>
                    <input type="file" name="foto_adjunta" id="archivo" accept="image/*" style="display:none" onchange="validarArchivo()">
                </div>

                <button type="submit" class="btn-enviar">Enviar a Oficina Técnica 🚀</button>
            </form>
        </div>
    </main>

    <script>
        function validarArchivo() {
            const input = document.getElementById('archivo');
            const texto = document.getElementById('info-archivo');
            if (input.files.length > 0) {
                texto.innerText = "✅ Foto lista para enviar: " + input.files[0].name;
                texto.style.color = "#25d366";
            }
        }
    </script>

</body>
</html>
