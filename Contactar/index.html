<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizar - Covering Styles</title>
    <style>
        :root { --azul: #2a75bb; }
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .nav { padding: 20px; border-bottom: 1px solid #333; font-weight: 900; letter-spacing: 3px; color: var(--azul); }
        .tarjeta { 
            max-width: 500px; margin: 50px auto; padding: 30px; 
            background: #111; border-radius: 20px; border: 1px solid #333;
        }
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; 
            background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box;
        }
        .btn { 
            width: 100%; padding: 15px; background: var(--azul); color: #fff; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="nav">CSTYLES</div>

    <div class="tarjeta">
        <h2 style="color: var(--azul);">SOLICITAR COTIZACIÓN</h2>
        <p style="color: #888; font-size: 0.8rem; margin-bottom: 30px;">Recibirás respuesta en tu correo o WhatsApp</p>

        <!-- FORMULARIO DIRECTO -->
        <form action="https://web3forms.com" method="POST">
            
            <!-- TU CLAVE ACTIVA -->
            <input type="hidden" name="access_key" value="0318e171-2b9a-481a-8648-9ca0a0de109a">
            
            <!-- CONFIGURACIÓN -->
            <input type="hidden" name="from_name" value="Catálogo CStyles">
            <input type="hidden" name="subject" value="Nueva Cotización desde Web">

            <input type="text" name="Nombre_Cliente" placeholder="Tu Nombre" required>
            <input type="tel" name="WhatsApp" placeholder="Número de WhatsApp" required>
            <input type="text" name="Vehiculo" placeholder="Modelo y Año del Auto" required>
            
            <select name="Diseno" required>
                <option value="" disabled selected>Selecciona el Diseño</option>
                <option value="BI-01">Bicolor BI-01</option>
                <option value="BI-02">Bicolor BI-02</option>
                <option value="Clasico">Diseño Clásico</option>
                <option value="Tela">Tela Automotriz</option>
            </select>

            <button type="submit" class="btn">ENVIAR SOLICITUD 🚀</button>
        </form>
    </div>

</body>
</html>
