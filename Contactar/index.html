<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizar - Covering Styles</title>
    <style>
        :root { --azul: #2a75bb; }
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .nav { padding: 20px; border-bottom: 1px solid #333; font-weight: 900; letter-spacing: 3px; color: var(--azul); }
        .tarjeta { 
            max-width: 500px; margin: 50px auto; padding: 30px; 
            background: #111; border-radius: 20px; border: 1px solid #333;
        }
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; 
            background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box;
        }
        .btn { 
            width: 100%; padding: 15px; background: var(--azul); color: #fff; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; 
        }
        .btn:hover { background: #1e5a91; }
        .foto-area { border: 2px dashed #444; padding: 20px; margin-bottom: 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav">CSTYLES</div>

    <div class="tarjeta">
        <h2>COTIZACIÓN OFICIAL</h2>
        <p style="color: #888; font-size: 0.8rem;">Los datos se enviarán a nuestro correo técnico</p>

        <!-- FORMULARIO ULTRA SIMPLE -->
        <form action="https://web3forms.com" method="POST" enctype="multipart/form-data">
            
            <!-- CLAVE Y CONFIGURACIÓN -->
            <input type="hidden" name="access_key" value="0318e171-2b9a-481a-8648-9ca0a0de109a">
            <input type="hidden" name="subject" value="Nueva Cotización CStyles">
            <input type="hidden" name="from_name" value="Web CStyles">

            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="tel" name="whatsapp" placeholder="WhatsApp" required>
            <input type="text" name="auto" placeholder="Auto y Año" required>
            
            <select name="modelo" required>
                <option value="">Selecciona Diseño</option>
                <option value="BI-01">BI-01</option>
                <option value="BI-02">BI-02</option>
                <option value="BI-03">BI-03</option>
                <option value="Clasico">Clásico</option>
            </select>

            <div class="foto-area" onclick="document.getElementById('f').click()">
                <span id="txt">📷 Subir foto de butaca</span>
                <input type="file" name="attachment" id="f" accept="image/*" style="display:none" onchange="document.getElementById('txt').innerText='✅ Foto Lista'">
            </div>

            <button type="submit" class="btn">ENVIAR AHORA</button>
        </form>
    </div>

</body>
</html>
