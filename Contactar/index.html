<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cotización Oficial - Covering Styles</title>
    <style>
        :root { --azul-cstyles: #2a75bb; --wa-green: #25d366; }
        
        body {
            background: linear-gradient(180deg, #000000 0%, #1a1c1e 100%);
            background-attachment: fixed;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-cotizar {
            width: 100%; height: 70px; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-cotizar a { color: var(--azul-cstyles); text-decoration: none; font-weight: 900; letter-spacing: 3px; font-size: 1.2rem; }

        .contenedor-principal { max-width: 500px; width: 90%; margin: 50px auto; text-align: center; }

        .tarjeta-formulario {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px; padding: 40px; backdrop-filter: blur(10px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        label { display: block; text-align: left; font-size: 0.7rem; color: #888; margin-bottom: 5px; padding-left: 5px; text-transform: uppercase; letter-spacing: 1px; }

        input, select {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; color: #fff; font-size: 0.9rem; outline: none; transition: 0.3s;
            width: 100%; box-sizing: border-box; margin-bottom: 20px;
        }
        input:focus, select:focus { border-color: var(--azul-cstyles); background: rgba(0,0,0,0.8); }

        /* Vista previa */
        #contenedor-preview { display: none; margin-bottom: 20px; animation: fadeIn 0.4s ease; }
        #img-preview { width: 100%; max-width: 200px; border-radius: 15px; border: 2px solid var(--azul-cstyles); box-shadow: 0 10px 30px rgba(42, 117, 187, 0.3); }

        .btn-enviar {
            width: 100%; background: var(--wa-green); color: white; border: none;
            padding: 20px; border-radius: 50px; font-size: 1rem; font-weight: 900;
            letter-spacing: 2px; cursor: pointer; transition: 0.4s; text-transform: uppercase;
        }
        .btn-enviar:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3); background: #1ebd59; }

        .referencia-preview {
            background: rgba(42, 117, 187, 0.1); padding: 15px; border-radius: 12px;
            margin-bottom: 20px; font-size: 0.7rem; color: #666; word-break: break-all;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .btn-inicio-flotante {
            position: fixed; bottom: 30px; left: 30px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--azul-cstyles); backdrop-filter: blur(10px); color: white;
            text-decoration: none; padding: 12px 20px; border-radius: 50px; display: flex; align-items: center; gap: 10px;
            z-index: 1000; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <nav class="nav-cotizar"><a href="/">CSTYLES</a></nav>

    <main class="contenedor-principal">
        <h1 style="color: var(--azul-cstyles); font-weight: 900; letter-spacing: 3px; font-size: 1.8rem;">SOLICITUD DE DISEÑO</h1>
        <p style="color: #666; font-size: 0.85rem; margin-bottom: 30px;">Recibirás respuesta inmediata en tu WhatsApp</p>

        <div class="tarjeta-formulario">
            <label>Tus Datos</label>
            <input type="text" id="nombre" placeholder="Tu Nombre" required>
            <input type="text" id="auto" placeholder="Vehículo y Año (Ej: Aveo 2015)" required>
            
            <label>1. Categoría de Diseño</label>
            <select id="categoria" onchange="cambiarModelos()" required>
                <option value="" disabled selected>Selecciona una categoría...</option>
                <option value="bicolor">Diseño Bicolor</option>
                <option value="clasico">Diseño Clásico</option>
                <option value="diamante">Diseño Diamante</option>
                <option value="especial">Diseños Especiales</option>
                <option value="tela">Telas y Mixtos</option>
            </select>

            <label>2. Modelo Específico</label>
            <select id="modelo" onchange="actualizarLinkVisual()" disabled required>
                <option value="">Elige primero la categoría...</option>
            </select>

            <div id="contenedor-preview">
                <label>Vista Previa:</label>
                <img id="img-preview" src="" alt="Vista previa">
            </div>

            <div class="referencia-preview">
                <strong>Enlace de Referencia:</strong><br>
                <span id="txtLink">Esperando selección...</span>
            </div>

            <button type="button" onclick="enviarWhatsApp()" class="btn-enviar">ENVIAR A WHATSAPP 📱</button>
        </div>
    </main>

    <script>
        // Catálogo basado en tus archivos reales
        const catalogo = {
            "bicolor": Array.from({length: 21}, (_, i) => ({ n: `Bicolor ${i+1}`, a: `bicolor${i+1}.png` })),
            "clasico": Array.from({length: 23}, (_, i) => ({ n: `Clásico ${i+1}`, a: `clasico${i+1}.jpg` })),
            "diamante": Array.from({length: 4}, (_, i) => ({ n: `Diamante ${i+1}`, a: `diamante${i+1}.jpg` })),
            "especial": Array.from({length: 9}, (_, i) => ({ n: `Especial ${i+1}`, a: `especial${i+1}.jpg` })),
            "tela": [
                { n: "Mixto 1", a: "mixto1.jpg" }, { n: "Mixto 2", a: "mixto2.jpg" },
                { n: "Tela 1", a: "tela1.jpg" }, { n: "Tela 2", a: "tela2.jpg" }, { n: "Tela 3", a: "tela3.jpg" }
            ]
        };

        function cambiarModelos() {
            const cat = document.getElementById('categoria').value;
            const modSelect = document.getElementById('modelo');
            modSelect.innerHTML = '<option value="" disabled selected>Selecciona el diseño...</option>';
            
            if (catalogo[cat]) {
                catalogo[cat].forEach(item => {
                    let opt = document.createElement('option');
                    opt.value = item.a;
                    opt.innerHTML = item.n;
                    modSelect.appendChild(opt);
                });
                modSelect.disabled = false;
            }
        }

        function actualizarLinkVisual() {
            const archivo = document.getElementById('modelo').value;
            const txtLink = document.getElementById('txtLink');
            const preview = document.getElementById('img-preview');
            const contenedor = document.getElementById('contenedor-preview');

            if (archivo) {
                const urlCompleta = `https://fundascs.com{archivo}`;
                txtLink.innerText = urlCompleta;
                preview.src = `/${archivo}`;
                contenedor.style.display = "block";
            }
        }

        function enviarWhatsApp() {
            const nombre = document.getElementById('nombre').value;
            const auto = document.getElementById('auto').value;
            const modSelect = document.getElementById('modelo');
            const archivo = modSelect.value;
            const nombreDiseno = modSelect.options[modSelect.selectedIndex]?.text;

            if(!nombre || !auto || !archivo) {
                alert("Por favor, completa todos los datos.");
                return;
            }

            const tel = "569XXXXXXXX"; // <-- PON TU NÚMERO AQUÍ
            const msj = `*COTIZACIÓN CSTYLES*\n\n👤 *Cliente:* ${nombre}\n🚗 *Vehículo:* ${auto}\n🎨 *Diseño:* ${nombreDiseno}\n🖼️ *Referencia:* https://fundascs.com{archivo}`;
            
            window.open(`https://wa.me{tel}?text=${encodeURIComponent(msj)}`, '_blank');
        }
    </script>

    <a href="https://fundascs.com" class="btn-inicio-flotante">
        <span>🏠</span><span style="font-size: 0.7rem; font-weight: 900; letter-spacing: 2px;">INICIO</span>
    </a>
</body>
</html>
