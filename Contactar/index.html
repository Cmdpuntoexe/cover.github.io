<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cotización Personalizada - CStyles</title>
    <style>
        :root { 
            --azul-cstyles: #2a75bb; 
            --wa-green: #25d366; 
            --dark-card: rgba(255, 255, 255, 0.03);
        }
        
        body {
            background: linear-gradient(180deg, #000000 0%, #1a1c1e 100%);
            background-attachment: fixed;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            min-height: 100vh;
        }

        /* BARRA DE NAVEGACIÓN */
        .nav-cotizar {
            width: 100%; height: 70px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-cotizar a {
            color: var(--azul-cstyles); text-decoration: none;
            font-weight: 900; letter-spacing: 3px; font-size: 1.2rem;
        }

        /* CONTENEDOR PRINCIPAL */
        .contenedor-principal {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .header-seccion h1 {
            font-size: 2.2rem; letter-spacing: 5px; font-weight: 900;
            color: var(--azul-cstyles); text-transform: uppercase;
            margin-bottom: 10px;
        }
        .header-seccion p { color: #888; margin-bottom: 40px; font-size: 0.9rem; }

        /* FORMULARIO PREMIUM */
        .tarjeta-formulario {
            background: var(--dark-card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .grupo-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        input, select {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--azul-cstyles); background: rgba(0,0,0,0.6); }

        /* SECCIÓN FOTO */
        .zona-carga-foto {
            border: 2px dashed rgba(42, 117, 187, 0.3);
            padding: 30px;
            border-radius: 20px;
            margin: 20px 0 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .zona-carga-foto:hover { 
            background: rgba(42, 117, 187, 0.05); 
            border-color: var(--azul-cstyles);
        }
        .zona-carga-foto span { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .zona-carga-foto p { margin: 0; font-weight: bold; font-size: 0.9rem; }
        .zona-carga-foto small { color: #666; display: block; margin-top: 5px; }

        /* BOTÓN DE ENVÍO */
        .btn-enviar {
            width: 100%;
            background: var(--azul-cstyles);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }
        .btn-enviar:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(42, 117, 187, 0.4);
            filter: brightness(1.1);
        }

        .footer-nota { margin-top: 30px; font-size: 0.75rem; color: #555; }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .grupo-input { grid-template-columns: 1fr; gap: 15px; }
            .header-seccion h1 { font-size: 1.6rem; }
            .tarjeta-formulario { padding: 25px; }
        }
    </style>
</head>
<body>

    <nav class="nav-cotizar">
        <a href="/">CSTYLES</a>
    </nav>

    <main class="contenedor-principal">
        <div class="header-seccion">
            <h1>Cotización Especial</h1>
            <p>Envíanos los detalles para confirmar la plantilla exacta de tu vehículo</p>
        </div>

        <div class="tarjeta-formulario">
            <form id="formCstyles">
                <div class="grupo-input">
                    <input type="text" id="nombre" placeholder="Tu Nombre Completo" required>
                    <input type="tel" id="telefono" placeholder="Número de Contacto" required>
                </div>

                <div class="grupo-input">
                    <input type="text" id="auto" placeholder="Marca, Modelo y Año (Ej: Mazda 3 2021)" required>
                    <input type="text" id="codigo" placeholder="Código de Diseño (Ej: BI-03)">
                </div>

                <!-- Simulación de carga de archivo -->
                <div class="zona-carga-foto" onclick="document.getElementById('inputFoto').click()">
                    <span>📸</span>
                    <p id="textoFoto">Sube una foto de tus asientos actuales</p>
                    <small>Necesario para confirmar la forma de la plantilla</small>
                    <input type="file" id="inputFoto" accept="image/*" style="display:none" onchange="actualizarTexto()">
                </div>

                <button type="submit" class="btn-enviar">Solicitar Presupuesto 🚀</button>
            </form>
            
            <p class="footer-nota">Al hacer clic, se abrirá tu WhatsApp para enviar los datos y la imagen.</p>
        </div>
    </main>

<script>
    function actualizarTexto() {
        const input = document.getElementById('inputFoto');
        const texto = document.getElementById('textoFoto');
        if (input.files.length > 0) {
            texto.innerText = "✅ Foto seleccionada: " + input.files[0].name;
            texto.style.color = "#25d366";
        }
    }

    document.getElementById('formCstyles').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nom = document.getElementById('nombre').value;
        const tel = document.getElementById('telefono').value;
        const aut = document.getElementById('auto').value;
        const cod = document.getElementById('codigo').value || "No especificado";
        
        const msg = encodeURIComponent(
            `*NUEVA SOLICITUD DE COTIZACIÓN*%0A%0A` +
            `👤 *Cliente:* ${nom}%0A` +
            `📱 *Teléfono:* ${tel}%0A` +
            `🚗 *Vehículo:* ${aut}%0A` +
            `🎨 *Diseño:* ${cod}%0A%0A` +
            `_Adjunto la foto de mi butaca para confirmar la plantilla._`
        );
        
        // LA LÍNEA CLAVE ES ESTA:
        window.open(`https://wa.me{msg}`, '_blank');
    });
</script>
