<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizar - Covering Styles</title>
    <style>
        :root { --azul: #2a75bb; --wa: #25d366; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; }
        .nav { padding: 20px; border-bottom: 1px solid #333; font-weight: 900; letter-spacing: 3px; color: var(--azul); }
        .tarjeta { 
            max-width: 450px; margin: 50px auto; padding: 30px; 
            background: #111; border-radius: 25px; border: 1px solid #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        input, select { 
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; 
            background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--azul); }
        .btn-enviar { 
            width: 100%; padding: 18px; background: var(--wa); color: #fff; 
            border: none; border-radius: 50px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-enviar:hover { transform: scale(1.03); background: #1ebd59; }
    </style>
</head>
<body>

    <div class="nav">CSTYLES</div>

    <div class="tarjeta">
        <h2 style="color: var(--azul); letter-spacing: 2px;">SOLICITUD DE COTIZACIÓN</h2>
        <p style="color: #888; font-size: 0.85rem; margin-bottom: 30px;">Completa los datos para coordinar tu diseño</p>

        <form id="formCstyles">
            <input type="text" id="nombre" placeholder="Tu Nombre" required>
            <input type="text" id="auto" placeholder="Vehículo y Año" required>
            
            <select id="modelo" required>
                <option value="" disabled selected>Selecciona un Diseño</option>
                <option value="BI-01">Bicolor BI-01</option>
                <option value="BI-02">Bicolor BI-02</option>
                <option value="BI-03">Bicolor BI-03</option>
                <option value="Clasico">Diseño Clásico</option>
                <option value="Tela">Tela Automotriz</option>
            </select>

            <button type="button" onclick="enviarWA()" class="btn-enviar">Continuar a WhatsApp 📱</button>
        </form>
    </div>

    <script>
        function enviarWA() {
            const nombre = document.getElementById('nombre').value;
            const auto = document.getElementById('auto').value;
            const modelo = document.getElementById('modelo').value;

            if(!nombre || !auto || !modelo) {
                alert("Por favor, completa todos los campos.");
                return;
            }

            // Construimos el mensaje con los códigos %20 (espacio) y %0A (salto de línea)
            const mensaje = encodeURIComponent(
                `*SOLICITUD DE COTIZACIÓN CStyles*%0A%0A` +
                `👤 *Nombre:* ${nombre}%0A` +
                `🚗 *Vehículo:* ${auto}%0A` +
                `🎨 *Diseño:* ${modelo}%0A%0A` +
                `_Hola, me interesa cotizar este diseño para mi auto._`
            );

            // Tu número de WhatsApp configurado sin espacios ni signos +
            window.open(`https://wa.me{mensaje}`, '_blank');
        }
    </script>
</body>
</html>
