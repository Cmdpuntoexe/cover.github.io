<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diseño Bicolor - CStyles</title>
    <style>
        :root { --azul-cstyles: #2a75bb; --wa-green: #25d366; }
        
        body {
            background: linear-gradient(180deg, #000000 0%, #373d42 100%);
            background-attachment: fixed;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            overflow-y: auto; 
        }

        .btn-volver {
            position: fixed; top: 15px; left: 15px;
            color: #b8b8b8; text-decoration: none;
            font-size: 0.7rem; letter-spacing: 2px;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 15px; border-radius: 5px;
            z-index: 100; background: rgba(0,0,0,0.7);
        }

        .tarjeta-detalle {
            display: flex; width: 95%; max-width: 1250px; 
            height: 88vh; 
            background: rgba(255, 255, 255, 0.03); border-radius: 25px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08);
            margin: 40px auto; overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .seccion-galeria {
            flex: 1.6; background: rgba(0,0,0,0.2);
            padding: 25px; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px; align-content: start;
        }

        .contenedor-foto {
            position: relative; width: 100%; height: 160px;
            border-radius: 10px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
        }
        .foto-item { width: 100%; height: 100%; object-fit: cover; }

        .ref-tag {
            position: absolute; top: 8px; left: 8px;
            background: var(--azul-cstyles); color: white;
            padding: 2px 8px; border-radius: 4px;
            font-size: 0.6rem; font-weight: 600;
        }

        .seccion-texto {
            flex: 0.8; padding: 25px 35px; 
            display: flex; flex-direction: column;
            background: rgba(0, 0, 0, 0.25); 
            border-left: 1px solid rgba(255,255,255,0.05);
            align-items: center; text-align: center; justify-content: center;
        }

        /* Estilo para la imagen que querías agregar */
        .img-info-destacada {
            width: 100%;
            max-width: 300px;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .titulo-diseno { font-size: 1.6rem; letter-spacing: 4px; margin: 5px 0; font-weight: 900; text-transform: uppercase;}
        .tagline { color: var(--azul-cstyles); font-size: 0.6rem; letter-spacing: 3px; font-weight: bold; margin-bottom: 10px;}

        /* MODAL CON NAVEGACIÓN */
        #modalImg {
            display: none; position: fixed; z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            flex-direction: column; justify-content: center; align-items: center;
        }
        
        .contenedor-slider {
            position: relative;
            display: flex; align-items: center; justify-content: center;
            width: 90%; max-width: 800px;
        }

        .modal-contenido { max-width: 100%; max-height: 70vh; border-radius: 10px; }

        .btn-nav {
            position: absolute; background: rgba(255,255,255,0.1);
            color: white; border: none; font-size: 2rem;
            padding: 20px; cursor: pointer; border-radius: 50%;
            z-index: 2100;
        }
        .btn-nav:hover { background: var(--azul-cstyles); }
        .prev { left: -80px; }
        .next { right: -80px; }

        .btn-wa-modal, .btn-whatsapp-general {
            background: var(--wa-green); color: white; text-decoration: none;
            padding: 12px 30px; border-radius: 50px; font-weight: bold; margin-top: 15px;
            display: inline-block;
        }

        @media (max-width: 900px) {
            .tarjeta-detalle { flex-direction: column; height: auto; margin-top: 80px; }
            .seccion-texto { order: 1; border-left: none; padding: 40px 20px; }
            .seccion-galeria { order: 2; height: auto; grid-template-columns: repeat(2, 1fr); }
            .btn-nav { padding: 10px; font-size: 1.5rem; }
            .prev { left: 5px; } .next { right: 5px; }
        }
        /* Estilos del Menú */
.nav-principal {
    width: 100%;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.nav-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
}

.nav-logo {
    color: var(--azul-cstyles);
    text-decoration: none;
    font-weight: 900;
    letter-spacing: 3px;
    font-size: 1.2rem;
}

.nav-links a {
    color: #fff;
    text-decoration: none;
    margin-left: 20px;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: 0.3s;
    opacity: 0.7;
}

.nav-links a:hover, .nav-links a.active {
    opacity: 1;
    color: var(--azul-cstyles);
}

@media (max-width: 600px) {
    .nav-container { flex-direction: column; gap: 10px; }
    .nav-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    .nav-links a { margin: 0 5px; font-size: 0.7rem; }
}

.instagram-link-top {
    color: #ffffff; /* Color blanco inicial */
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    opacity: 0.8;
}

.instagram-link-top:hover {
    opacity: 1;
    color: var(--azul-cstyles); /* Cambia a tu azul al pasar el mouse */
    transform: translateX(5px); /* Se mueve un poquito a la derecha */
    text-shadow: 0 0 10px rgba(42, 117, 187, 0.5);
}

.ig-icon {
    font-size: 0.9rem;
    margin-right: 5px;
}

        
    </style>
</head>
<body>

    <!-- Barra de Navegación CStyles -->
<nav class="nav-principal">
    <div class="nav-container">
<!-- Enlace exacto a tu Instagram -->
<a href="https://www.instagram.com/covering_styles?igsh=aXg1dnh5MHpqOHFh" target="_blank" class="instagram-link-top">
    📸 @covering_styles
</a>

        <div class="nav-links">
            <a href="/clasico/">Clásico</a>
            <a href="/tela-automotriz/">Tela Automotriz</a>
            <a href="/bicolor/">Bicolor</a>
            <a href="/estilos-personalizados/" class="active">Personalizados</a>
        </div>
    </div>
</nav>


    <a href="/super-galeri20/" class="btn-volver">❮ Volver</a>

    <div id="modalImg">
        <span style="position:absolute; top:20px; right:30px; color:white; font-size:40px; cursor:pointer;" onclick="cerrarVista()">&times;</span>
        <div class="contenedor-slider">
            <button class="btn-nav prev" onclick="cambiarFoto(-1)">❮</button>
            <img class="modal-contenido" id="imgGrande">
            <button class="btn-nav next" onclick="cambiarFoto(1)">❯</button>
        </div>
        <div id="modalRef" style="background:var(--azul-cstyles); padding:8px 20px; border-radius:50px; font-weight:900; margin-top:10px;"></div>
        <a href="#" id="waLinkModal" class="btn-wa-modal" target="_blank">SOLICITAR DISEÑO 📱</a>
    </div>

    <div class="tarjeta-detalle">
        <div class="seccion-galeria" id="contenedorGaleria"></div>
        <div class="seccion-texto">
            
            <!-- Foto agregada arriba de Linea Dinamica -->
            <img src="/bicolor21-informacion.jpg" alt="Información" class="img-info-destacada">

            <div class="tagline">LÍNEA DINÁMICA</div>
            <h2 class="titulo-diseno">DISEÑO BICOLOR</h2>
            <p style="font-size: 0.7rem; color: #888;">Toca un diseño para ver sus variantes.</p>
            <a href="https://wa.me" class="btn-whatsapp-general" target="_blank">CONSULTA PROFESIONAL 📱</a>
        </div>
    </div>

<script>
    const miTelefono = "56961960385";

    const diseños = [
        { ref: "BI-01", fotos: ["/bicolor1.png", "/variante1.jpg", "/variante2.jpg"] }, 
        { ref: "BI-02", fotos: ["/diamante4.png", "/1b.jpg"] },
        { ref: "BI-03", fotos: ["/2Bicolor.jpg"] },
        { ref: "BI-04", fotos: ["/bicolor2.png","/bicolor18.png", "/bicolor19.png", "/bicolor20.png","/bicolor8.jpg"] },
        { ref: "BI-05", fotos: ["/bicolor3.png","/bicolor4.png", "/bicolor5.png", "/bicolor6.png","/bicolor7.jpg"] },
        { ref: "BI-06", fotos: ["/bicolor10.png"] },
        { ref: "BI-07", fotos: ["/Bicolor9.jpg"] },
        { ref: "BI-08", fotos: ["/bicolor14.jpg"] }
    ];

    let diseñoActual = 0;
    let fotoActual = 0;
    const galeria = document.getElementById("contenedorGaleria");

    diseños.forEach((diseno, index) => {
        const div = document.createElement("div");
        div.className = "contenedor-foto";
        div.onclick = function() { abrirModal(index); };
        const img = document.createElement("img");
        img.src = diseno.fotos[0];
        img.className = "foto-item";
        const tag = document.createElement("div");
        tag.className = "ref-tag";
        tag.innerText = diseno.ref;
        div.appendChild(img);
        div.appendChild(tag);
        galeria.appendChild(div);
    });

    function abrirModal(index) {
        diseñoActual = index;
        fotoActual = 0;
        mostrarFoto();
        document.getElementById("modalImg").style.display = "flex";
    }

    function cambiarFoto(dir) {
        const fotos = diseños[diseñoActual].fotos;
        fotoActual = (fotoActual + dir + fotos.length) % fotos.length;
        mostrarFoto();
    }

    function mostrarFoto() {
        const diseno = diseños[diseñoActual];
        document.getElementById("imgGrande").src = diseno.fotos[fotoActual];
        document.getElementById("modalRef").innerText = `${diseno.ref} - Opción ${fotoActual + 1}`;
        
        const mensaje = encodeURIComponent(`Hola, me interesa el diseño ${diseno.ref} (Opción ${fotoActual + 1})`);
        document.getElementById("waLinkModal").href = `https://wa.me{miTelefono}?text=${mensaje}`;
        
        const botones = document.querySelectorAll('.btn-nav');
        botones.forEach(btn => btn.style.display = diseno.fotos.length > 1 ? 'block' : 'none');
    }

    function cerrarVista() { document.getElementById("modalImg").style.display = "none"; }
</script>
</body>
</html>
