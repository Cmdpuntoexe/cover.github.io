<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diseño Bicolor - CStyles</title>
    <style>
        :root { --azul-cstyles: #2a75bb; --wa-green: #25d366; }
        
        body {
            background: linear-gradient(180deg, #000000 0%, #373d42 100%);
            background-attachment: fixed;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            overflow-y: auto; 
        }

        .btn-volver {
            position: fixed; top: 15px; left: 15px;
            color: #b8b8b8; text-decoration: none;
            font-size: 0.7rem; letter-spacing: 2px;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 15px; border-radius: 5px;
            z-index: 100; background: rgba(0,0,0,0.7);
        }

        .tarjeta-detalle {
            display: flex; width: 95%; max-width: 1250px; 
            height: 88vh; 
            background: rgba(255, 255, 255, 0.03); border-radius: 25px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08);
            margin: 40px auto; overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .seccion-galeria {
            flex: 1.4; background: rgba(0,0,0,0.2);
            padding: 25px; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px; align-content: start;
        }

        .contenedor-foto {
            position: relative; width: 100%; height: 160px;
            border-radius: 10px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .contenedor-foto:hover { transform: translateY(-5px); }
        .foto-item { width: 100%; height: 100%; object-fit: cover; }

        .ref-tag {
            position: absolute; top: 8px; left: 8px;
            background: var(--azul-cstyles); color: white;
            padding: 2px 8px; border-radius: 4px;
            font-size: 0.6rem; font-weight: 600;
        }

        .seccion-texto {
            flex: 1; padding: 25px 35px; 
            display: flex; flex-direction: column;
            background: rgba(0, 0, 0, 0.25); 
            border-left: 1px solid rgba(255,255,255,0.05);
            align-items: center; text-align: center; justify-content: center;
        }

        /* --- IMAGEN DE INFORMACIÓN DESTACADA --- */
        .img-info-bicolor {
            width: 85%; /* Ahora ocupa casi todo el ancho de su columna */
            max-width: 320px; /* Tamaño máximo para que no se vea gigante en PC */
            height: auto; 
            margin-bottom: 25px; 
            border-radius: 18px; 
            border: 2px solid rgba(42, 117, 187, 0.3); /* Borde con tu color azul */
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        
        .img-info-bicolor:hover {
            transform: scale(1.08);
            filter: brightness(1.1);
            border-color: var(--azul-cstyles);
            box-shadow: 0 20px 40px rgba(42, 117, 187, 0.4);
        }

        .titulo-diseno { font-size: 1.8rem; letter-spacing: 4px; margin: 5px 0; font-weight: 900; text-transform: uppercase;}
        .tagline { color: var(--azul-cstyles); font-size: 0.7rem; letter-spacing: 4px; font-weight: bold; margin-bottom: 5px;}

        .btn-whatsapp-general {
            background: var(--wa-green); color: white; text-decoration: none;
            padding: 15px 35px; border-radius: 50px; font-weight: bold; margin-top: 20px;
            font-size: 0.9rem; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }
        .btn-whatsapp-general:hover { background: #1ebd59; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(37, 211, 102, 0.3); }

        /* MODAL */
        #modalImg {
            display: none; position: fixed; z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            flex-direction: column; justify-content: center; align-items: center;
        }

        @media (max-width: 900px) {
            .tarjeta-detalle { flex-direction: column; height: auto; margin-top: 80px; }
            .seccion-texto { order: 1; border-left: none; padding: 40px 20px; }
            .seccion-galeria { order: 2; height: auto; grid-template-columns: repeat(2, 1fr); }
            .img-info-bicolor { width: 90%; max-width: 250px; }
        }
    </style>
</head>
<body>

    <a href="/galeria/" class="btn-volver">❮ Volver</a>

    <!-- Modal con el resto de la funcionalidad se mantiene igual -->
    <div id="modalImg">
        <span style="position:absolute; top:20px; right:30px; color:white; font-size:40px; cursor:pointer;" onclick="cerrarVista()">&times;</span>
        <div class="contenedor-slider">
            <button class="btn-nav prev" style="position: absolute; left: -80px; background: none; border: none; color: white; font-size: 3rem; cursor: pointer;" onclick="cambiarFoto(-1)">❮</button>
            <img class="modal-contenido" id="imgGrande" style="max-width: 90%; max-height: 70vh; border-radius: 10px;">
            <button class="btn-nav next" style="position: absolute; right: -80px; background: none; border: none; color: white; font-size: 3rem; cursor: pointer;" onclick="cambiarFoto(1)">❯</button>
        </div>
        <div id="modalRef" style="background:var(--azul-cstyles); padding:8px 20px; border-radius:50px; font-weight:900; margin-top:10px;"></div>
        <a href="#" id="waLinkModal" style="background: var(--wa-green); color: white; text-decoration: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; margin-top: 15px;" target="_blank">SOLICITAR DISEÑO 📱</a>
    </div>

    <div class="tarjeta-detalle">
        <div class="seccion-galeria" id="contenedorGaleria"></div>
        
        <div class="seccion-texto">
            <!-- IMAGEN IMPORTANTE MÁS GRANDE -->
            <img src="/bicolor21-informacion.jpg" alt="Información Bicolor" class="img-info-bicolor">
            
            <div class="tagline">LÍNEA DINÁMICA</div>
            <h2 class="titulo-diseno">DISEÑO BICOLOR</h2>
            <p style="font-size: 0.75rem; color: #aaa;">Toca un diseño para ver sus variantes.</p>
            <a href="https://wa.me" class="btn-whatsapp-general" target="_blank">CONSULTA PROFESIONAL 📱</a>
        </div>
    </div>

<script>
    const miTelefono = "56961960385"; 

    const diseños = [
        { ref: "BI-01", fotos: ["/bicolor1.png", "/variante1.jpg", "/variante2.jpg"] }, 
        { ref: "BI-02", fotos: ["/diamante4.png", "/1b.jpg"] },
        { ref: "BI-03", fotos: ["/tu-foto-real-bi03.jpg"] }, 
        { ref: "BI-04", fotos: ["/bicolor2.png","/bicolor18.png", "/bicolor19.png", "/bicolor20.png"] },
        { ref: "BI-05", fotos: ["/bicolor3.png","/bicolor4.png", "/bicolor5.png", "/bicolor6.png"] },
        { ref: "BI-06", fotos: ["/2Bicolor.jpg"] },
        { ref: "BI-07", fotos: ["/bicolor2.png"] },
        { ref: "BI-08", fotos: ["/bicolor2.png"] }
    ];

    let diseñoActual = 0;
    let fotoActual = 0;
    const galeria = document.getElementById("contenedorGaleria");

    diseños.forEach((diseno, index) => {
        const div = document.createElement("div");
        div.className = "contenedor-foto";
        div.onclick = function() { abrirModal(index); };
        const img = document.createElement("img");
        img.src = diseno.fotos[0]; 
        img.className = "foto-item";
        const tag = document.createElement("div");
        tag.className = "ref-tag";
        tag.innerText = diseno.ref;
        div.appendChild(img);
        div.appendChild(tag);
        galeria.appendChild(div);
    });

    function abrirModal(index) {
        diseñoActual = index;
        fotoActual = 0;
        mostrarFoto();
        document.getElementById("modalImg").style.display = "flex";
    }

    function cambiarFoto(dir) {
        const fotos = diseños[diseñoActual].fotos;
        fotoActual = (fotoActual + dir + fotos.length) % fotos.length;
        mostrarFoto();
    }

    function mostrarFoto() {
        const diseno = diseños[diseñoActual];
        document.getElementById("imgGrande").src = diseno.fotos[fotoActual];
        document.getElementById("modalRef").innerText = `${diseno.ref} - Opción ${fotoActual + 1}`;
        const mensaje = encodeURIComponent(`Hola, me interesa el diseño ${diseno.ref} (Opción ${fotoActual + 1})`);
        document.getElementById("waLinkModal").href = `https://wa.me{miTelefono}?text=${mensaje}`;
    }

    function cerrarVista() { document.getElementById("modalImg").style.display = "none"; }
</script>
</body>
</html>
