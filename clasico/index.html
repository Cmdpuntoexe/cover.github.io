<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño Clásico - Referencias</title>
    <style>
        :root { --azul-cstyles: #2a75bb; }
        
        body {
            background: linear-gradient(180deg, #000000 0%, #373d42 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .btn-volver {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #b8b8b8;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
            z-index: 100;
            background: rgba(0,0,0,0.5);
        }
        .btn-volver:hover { background: white; color: black; }

        .tarjeta-detalle {
            display: flex;
            width: 95%;
            max-width: 1250px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 25px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .seccion-galeria {
            flex: 1.6;
            background: rgba(0,0,0,0.2);
            padding: 25px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            align-content: start;
        }

        /* Estilo del contenedor de cada foto para el número */
        .contenedor-foto {
            position: relative;
            width: 100%;
            height: 180px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }
        .contenedor-foto:hover {
            transform: scale(1.03);
            border-color: var(--azul-cstyles);
        }

        .foto-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        /* Etiqueta de referencia (ID) */
        .ref-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(42, 117, 187, 0.9); /* Azul de tu logo */
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .seccion-texto {
            flex: 0.7;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.25);
            border-left: 1px solid rgba(255,255,255,0.05);
        }

        .logo-en-texto { max-width: 160px; margin-bottom: 25px; }
        .categoria-tag { color: var(--azul-cstyles); font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
        .titulo-diseno { font-size: 2rem; letter-spacing: 4px; margin: 0 0 20px 0; text-transform: uppercase; font-weight: 900; }
        
        .puntos-clave { margin: 0; padding: 0; list-style: none; }
        .puntos-clave li { margin-bottom: 12px; font-size: 0.85rem; display: flex; gap: 10px; align-items: center; color: #ccc; }
        .puntos-clave li::before { content: "✓"; color: var(--azul-cstyles); font-weight: bold; }

        .btn-whatsapp {
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: transparent;
            color: var(--azul-cstyles);
            border: 2px solid var(--azul-cstyles);
            padding: 16px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 12px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-whatsapp:hover { background: var(--azul-cstyles); color: white; box-shadow: 0 0 30px rgba(42, 117, 187, 0.4); }

        @media (max-width: 900px) {
            .tarjeta-detalle { flex-direction: column; height: auto; margin: 80px 20px 20px; }
            .seccion-galeria { height: 400px; }
        }
    </style>
</head>
<body>

    <a href="../galeria/" class="btn-volver">❮ Volver al Catálogo</a>

    <div class="tarjeta-detalle">
        <div class="seccion-galeria" id="contenedorGaleria"></div>

        <div class="seccion-texto">
            <img src="../imajen2.png" alt="Covering Styles" class="logo-en-texto">
            <span class="categoria-tag">Línea Premium</span>
            <h2 class="titulo-diseno">DISEÑO CLÁSICO</h2>
            
            <div class="descripcion-tecnica">
                <p style="font-size: 0.9rem; line-height: 1.6; color: #aaa;">Indica el código de referencia (ej: <strong>CL-01</strong>) al realizar tu consulta.</p>
                <ul class="puntos-clave">
                    <li>Ajuste perfecto a medida</li>
                    <li>Ergonomía superior</li>
                    <li>Costuras reforzadas</li>
                    <li>Material de alto tráfico</li>
                </ul>
            </div>
            
            <a href="https://wa.me" class="btn-whatsapp" target="_blank">
                CONSULTAR POR WHATSAPP 📱
            </a>
        </div>
    </div>

    <script>
        // LISTA DE FOTOS
        const misFotos = [
            "../clasico1.jpg", "../clasico2.jpg", "../clasico3.jpg", 
            "../clasico4.jpg", "../clasico5.jpg", "../clasico6.jpg", 
            "../clasico7.jpg", "../clasico8.jpg", "../clasico11.jpg", 
            "../clasico10.jpg", "../clasico12.png", "../clasico13.png", "../clasico14.png"
        ];

        const galeria = document.getElementById("contenedorGaleria");

        misFotos.forEach((ruta, index) => {
            // Crear el contenedor de la foto
            const div = document.createElement("div");
            div.className = "contenedor-foto";

            // Crear la imagen
            const img = document.createElement("img");
            img.src = ruta;
            img.className = "foto-item";
            img.onerror = function() { div.style.display = 'none'; }; // Oculta si no carga

            // Crear la etiqueta de referencia (CL-01, CL-02...)
            const tag = document.createElement("div");
            tag.className = "ref-tag";
            // El index + 1 es para que empiece en 01 y no en 00
            const numero = (index + 1).toString().padStart(2, '0');
            tag.innerText = `CL-${numero}`;

            // Armar el conjunto
            div.appendChild(img);
            div.appendChild(tag);
            galeria.appendChild(div);
        });
    </script>
</body>
</html>
