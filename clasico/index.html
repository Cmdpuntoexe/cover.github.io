<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño Clásico - Referencias</title>
    <style>
        :root { --azul-cstyles: #2a75bb; }
        
        body {
            background: linear-gradient(180deg, #000000 0%, #373d42 100%);
            background-attachment: fixed;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* 1. BOTÓN VOLVER */
        .btn-volver {
            position: fixed; top: 20px; left: 20px;
            color: #b8b8b8; text-decoration: none;
            font-size: 0.7rem; letter-spacing: 2px;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 15px; border-radius: 5px;
            transition: 0.3s; z-index: 100; background: rgba(0,0,0,0.4);
        }
        .btn-volver:hover { background: white; color: black; }

        /* 2. TARJETA PRINCIPAL */
        .tarjeta-detalle {
            display: flex; width: 95%; max-width: 1250px; height: 85vh;
            background: rgba(255, 255, 255, 0.03); border-radius: 25px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .seccion-galeria {
            flex: 1.6; background: rgba(0,0,0,0.2);
            padding: 25px; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px; align-content: start;
        }

        .contenedor-foto {
            position: relative; width: 100%; height: 160px;
            border-radius: 10px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            transition: transform 0.3s ease; cursor: pointer;
        }
        .contenedor-foto:hover { transform: scale(1.02); border-color: var(--azul-cstyles); }

        .foto-item { width: 100%; height: 100%; object-fit: cover; }

        .ref-tag {
            position: absolute; top: 8px; left: 8px;
            background: var(--azul-cstyles); color: white;
            padding: 2px 8px; border-radius: 4px;
            font-size: 0.6rem; font-weight: 600;
        }

        /* 3. VENTANA FLOTANTE (LIGHTBOX) */
        #modalImg {
            display: none; position: fixed; z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }

        .modal-contenido { max-width: 90%; max-height: 80%; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        #modalRef {
            position: absolute; bottom: 40px;
            background: var(--azul-cstyles); color: white;
            padding: 10px 25px; border-radius: 50px;
            font-weight: 900; font-size: 1.2rem;
        }

        .cerrar-modal {
            position: absolute; top: 30px; right: 40px;
            color: white; font-size: 40px; cursor: pointer;
        }

        /* 4. SECCIÓN TEXTO */
        .seccion-texto {
            flex: 0.7; padding: 40px; display: flex; flex-direction: column;
            background: rgba(0, 0, 0, 0.25); border-left: 1px solid rgba(255,255,255,0.05);
        }

        .logo-en-texto { max-width: 150px; margin-bottom: 25px; }
        .titulo-diseno { font-size: 1.8rem; letter-spacing: 4px; margin: 0 0 20px 0; text-transform: uppercase; font-weight: 900; }
        .btn-whatsapp {
            margin-top: auto; display: flex; align-items: center; justify-content: center;
            gap: 10px; background: transparent; color: var(--azul-cstyles);
            border: 1px solid var(--azul-cstyles); padding: 14px;
            text-decoration: none; font-weight: bold; border-radius: 10px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-whatsapp:hover { background: var(--azul-cstyles); color: white; }

        @media (max-width: 900px) {
            .tarjeta-detalle { flex-direction: column; height: auto; margin: 80px 10px 20px; overflow-y: scroll; }
            .seccion-galeria { height: 400px; }
        }
    </style>
</head>
<body>

    <a href="../galeria/" class="btn-volver">❮ Volver</a>

    <!-- VENTANA PARA VER EN GRANDE -->
    <div id="modalImg">
        <span class="cerrar-modal" onclick="cerrarVista()">&times;</span>
        <img class="modal-contenido" id="imgGrande">
        <div id="modalRef"></div>
    </div>

    <div class="tarjeta-detalle">
        <div class="seccion-galeria" id="contenedorGaleria"></div>

        <div class="seccion-texto">
            <img src="../imajen2.png" alt="Covering Styles" class="logo-en-texto">
            <span style="color: var(--azul-cstyles); font-size: 0.6rem; letter-spacing: 3px;">LÍNEA PREMIUM</span>
            <h2 class="titulo-diseno">DISEÑO CLÁSICO</h2>
            
            <p style="font-size: 0.8rem; color: #888;">Haz clic en una foto para verla en grande.</p>
            
            <a href="https://wa.me" class="btn-whatsapp" target="_blank">
                CONSULTAR DISEÑO 📱
            </a>
        </div>
    </div>

    <script>
        const misFotos = [
            "../clasico1.jpg", "../clasico2.jpg", "../clasico3.jpg", 
            "../clasico4.jpg", "../clasico5.jpg", "../clasico6.jpg", 
            "../clasico7.jpg", "../clasico8.jpg", "../clasico11.jpg", 
            "../clasico10.jpg", "../clasico12.png", "../clasico13.png", "../clasico14.png"
        ];

        const galeria = document.getElementById("contenedorGaleria");

        misFotos.forEach((ruta, index) => {
            const div = document.createElement("div");
            div.className = "contenedor-foto";
            const ref = `CL-${(index + 1).toString().padStart(2, '0')}`;
            
            // Al hacer clic abre el modal
            div.onclick = () => verGrande(ruta, ref);

            const img = document.createElement("img");
            img.src = ruta;
            img.className = "foto-item";

            const tag = document.createElement("div");
            tag.className = "ref-tag";
            tag.innerText = ref;

            div.appendChild(img);
            div.appendChild(tag);
            galeria.appendChild(div);
        });

        function verGrande(ruta, ref) {
            document.getElementById("modalImg").style.display = "flex";
            document.getElementById("imgGrande").src = ruta;
            document.getElementById("modalRef").innerText = ref;
        }

        function cerrarVista() {
            document.getElementById("modalImg").style.display = "none";
        }
    </script>
</body>
</html>
