<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personalizados - CStyles</title>
    <style>
        :root { --azul-cstyles: #2a75bb; --wa-green: #25d366; --gold: #d4af37; }
        
        html { scroll-behavior: smooth; }

        body {
            background: linear-gradient(180deg, #000000 0%, #1a1a1a 100%);
            background-attachment: fixed;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            min-height: 100vh;
        }

        /* NAVEGACIÓN (Igual a las otras páginas) */
        .nav-principal {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto;
            display: flex; justify-content: space-between;
            align-items: center; padding: 15px 20px;
        }
        .instagram-link-top {
            color: #ffffff; text-decoration: none; font-size: 0.85rem;
            font-weight: 600; letter-spacing: 1px; transition: 0.3s; opacity: 0.8;
        }
        .nav-links a {
            color: #fff; text-decoration: none; margin-left: 20px;
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s; opacity: 0.7;
        }
        .nav-links a.active { opacity: 1; color: var(--azul-cstyles); }

        /* TARJETA DE DISEÑO */
        .tarjeta-detalle {
            display: flex; width: 95%; max-width: 1100px; 
            min-height: 80vh; margin: 40px auto;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden; backdrop-filter: blur(15px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        /* SECCIÓN IZQUIERDA (IMAGEN) */
        .seccion-preview {
            flex: 1.2; background: rgba(0,0,0,0.2); padding: 40px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .img-principal {
            width: 100%; max-width: 400px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(42, 117, 187, 0.3);
            transition: 0.5s;
        }
        .img-principal:hover { transform: scale(1.03); }

        /* SECCIÓN DERECHA (PASOS E INFO) */
        .seccion-info {
            flex: 1; padding: 45px; display: flex; flex-direction: column;
            background: rgba(0, 0, 0, 0.25); border-left: 1px solid rgba(255,255,255,0.05);
            align-items: center; text-align: center; justify-content: center;
        }

        .logo-pequeno { width: 140px; margin-bottom: 20px; opacity: 0.9; }
        .tagline { letter-spacing: 4px; color: var(--gold); font-size: 0.6rem; font-weight: bold; margin-bottom: 10px; }
        
        /* ESTILO DE PASOS */
        .pasos-container { width: 100%; max-width: 300px; margin: 25px 0; }
        .paso-item {
            text-align: left; padding-left: 15px; margin-bottom: 20px;
            border-left: 3px solid var(--azul-cstyles);
        }
        .paso-n { font-size: 0.65rem; color: var(--azul-cstyles); font-weight: bold; letter-spacing: 1px; }
        .paso-txt { font-size: 1.1rem; font-weight: 800; margin-top: 3px; letter-spacing: 1px; }

        .btn-wa-personalizar {
            background: var(--wa-green); color: white; text-decoration: none;
            padding: 18px 45px; border-radius: 50px; font-weight: 900;
            transition: 0.3s; font-size: 0.9rem; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
            display: inline-block;
        }
        .btn-wa-personalizar:hover { transform: translateY(-3px); background: #1ebd59; }

        @media (max-width: 900px) {
            .tarjeta-detalle { flex-direction: column; height: auto; margin-top: 70px; }
            .seccion-info { padding: 40px 20px; border-left: none; order: 1; }
            .seccion-preview { padding: 40px 20px; order: 2; }
            .img-principal { max-width: 300px; }
        }
    </style>
</head>
<body>

<nav class="nav-principal">
    <div class="nav-container">
        <a href="https://instagram.com" target="_blank" class="instagram-link-top">@covering_styles</a>
        <div class="nav-links">
            <a href="/clasico/">Clásico</a>
            <a href="/tela-automotriz/">Telas</a>
            <a href="/bicolor/">Bicolor</a>
            <a href="/estilos-personalizados/" class="active">Personalizados</a>
        </div>
    </div>
</nav>

<div class="tarjeta-detalle">
    <!-- IMAGEN DE REFERENCIA -->
    <div class="seccion-preview">
        <img src="/especial3.jpg" alt="Diseño Personalizado" class="img-principal">
        <p style="margin-top: 20px; font-size: 0.7rem; color: #666; letter-spacing: 2px;">TU IMAGINACIÓN ES EL LÍMITE</p>
    </div>

    <!-- INFORMACIÓN Y PASOS -->
    <div class="seccion-info">
        <img src="/imajen2.png" alt="Logo CStyles" class="logo-pequeno">
        <div class="tagline">DISEÑOS ÚNICOS</div>
        <h1 style="font-size: 1.8rem; font-weight: 900; margin: 0; letter-spacing: 2px;">PERSONALIZADOS</h1>
        
        <div class="pasos-container">
            <div class="paso-item">
                <div class="paso-n">PASO 1</div>
                <div class="paso-txt">Elige tu modelo</div>
            </div>
            <div class="paso-item" style="border-left-color: #fff;">
                <div class="paso-n">PASO 2</div>
                <div class="paso-txt">Envíanos tu foto</div>
            </div>
            <div class="paso-item">
                <div class="paso-n">PASO 3</div>
                <div class="paso-txt">¡Listo para entrega!</div>
            </div>
        </div>

        <a href="https://whatsapp.com." 
           class="btn-wa-personalizar">
           DISEÑAR MI FUNDA 📱
        </a>
    </div>
</div>

</body>
</html>
