<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personalizados - CStyles</title>
    <style>
        :root { --azul-cstyles: #2a75bb; --wa-green: #25d366; --gold: #d4af37; }
        
        body {
            background: linear-gradient(180deg, #000000 0%, #1a1a1a 100%);
            background-attachment: fixed; margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif; color: #ffffff;
            min-height: 100vh; overflow-y: auto; 
        }

        /* NAVEGACIÓN (IDÉNTICA A TU IMAGEN) */
        .nav-principal {
            width: 100%; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto; display: flex; 
            justify-content: space-between; align-items: center; padding: 15px 20px;
        }
        .nav-links a {
            color: #fff; text-decoration: none; margin-left: 20px;
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s; opacity: 0.7;
        }
        .nav-links a.active { opacity: 1; color: var(--azul-cstyles); }

        /* LA TARJETA (ESTILO DE TU IMAGEN) */
        .tarjeta-detalle {
            display: flex; width: 95%; max-width: 1200px; 
            min-height: 80vh; margin: 40px auto;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden; backdrop-filter: blur(15px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        /* GALERÍA IZQUIERDA */
        .seccion-galeria {
            flex: 1.5; background: rgba(0,0,0,0.2); padding: 30px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
        }
        .contenedor-foto {
            position: relative; border-radius: 15px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); height: 160px;
        }
        .foto-item { width: 100%; height: 100%; object-fit: cover; }
        .ref-tag {
            position: absolute; top: 10px; left: 10px;
            background: var(--azul-cstyles); color: white;
            padding: 4px 10px; border-radius: 5px; font-size: 0.6rem; font-weight: 900;
        }

        /* INFO DERECHA (FORMULARIO) */
        .seccion-texto {
            flex: 1; padding: 40px; display: flex; flex-direction: column;
            background: rgba(0, 0, 0, 0.25); border-left: 1px solid rgba(255,255,255,0.05);
            justify-content: center; align-items: center;
        }

        label { display: block; text-align: left; font-size: 0.65rem; color: #888; margin-bottom: 5px; text-transform: uppercase; width: 100%; }
        input, textarea {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px; border-radius: 10px; color: #fff; font-size: 0.85rem; 
            width: 100%; box-sizing: border-box; margin-bottom: 12px; outline: none;
        }
        
        .zona-foto {
            background: rgba(255,255,255,0.02); border: 1px dashed var(--azul-cstyles);
            padding: 15px; border-radius: 10px; margin-bottom: 15px; width: 100%; box-sizing: border-box;
        }

        .btn-enviar {
            width: 100%; background: var(--wa-green); color: white; border: none;
            padding: 18px; border-radius: 50px; font-size: 0.9rem; font-weight: 900;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-enviar:hover { transform: translateY(-3px); background: #1ebd59; }

        @media (max-width: 900px) {
            .tarjeta-detalle { flex-direction: column; height: auto; }
            .seccion-galeria { grid-template-columns: repeat(2, 1fr); order: 2; }
            .seccion-texto { order: 1; border-left: none; }
        }
    </style>
</head>
<body>

<nav class="nav-principal">
    <div class="nav-container">
        <a href="/" style="color: var(--azul-cstyles); text-decoration: none; font-weight: 900; letter-spacing: 3px;">CSTYLES</a>
        <div class="nav-links">
            <a href="/clasico/">Clásico</a>
            <a href="/tela-automotriz/">Telas</a>
            <a href="/bicolor/">Bicolor</a>
            <a href="/personalizados/" class="active">Personalizados</a>
        </div>
    </div>
</nav>

<div class="tarjeta-detalle">
    <!-- GALERÍA COMO LA DE TELAS -->
    <div class="seccion-galeria">
        <div class="contenedor-foto"><img src="/especial1.jpg" class="foto-item"><div class="ref-tag">ES-01</div></div>
        <div class="contenedor-foto"><img src="/especial2.jpg" class="foto-item"><div class="ref-tag">ES-02</div></div>
        <div class="contenedor-foto"><img src="/especial3.jpg" class="foto-item"><div class="ref-tag">ES-03</div></div>
        <div class="contenedor-foto"><img src="/especial4.jpg" class="foto-item"><div class="ref-tag">ES-04</div></div>
        <div class="contenedor-foto"><img src="/especial5.jpg" class="foto-item"><div class="ref-tag">ES-05</div></div>
        <div class="contenedor-foto"><img src="/especial6.jpg" class="foto-item"><div class="ref-tag">ES-06</div></div>
    </div>

    <!-- FORMULARIO FORMINIT A LA DERECHA -->
    <div class="seccion-texto">
        <div style="letter-spacing: 4px; color: var(--gold); font-size: 0.6rem; font-weight: bold; margin-bottom: 5px;">CATÁLOGO ESPECIAL</div>
        <h2 style="font-size: 1.5rem; font-weight: 900; margin-bottom: 20px; letter-spacing: 2px;">DISEÑO A TU MEDIDA</h2>
        
        <form action="https://forminit.com" method="POST" enctype="multipart/form-data" style="width: 100%;">
            <input type="hidden" name="fi-redirect" value="https://fundascs.com">
            
            <label>Nombre</label>
            <input type="text" name="fi-sender-fullName" placeholder="Tu nombre" required>
            
            <label>Auto</label>
            <input type="text" name="fi-sender-vehicle" placeholder="Modelo y Año" required>

            <label style="color: var(--gold);">📸 ADJUNTA TU REFERENCIA</label>
            <div class="zona-foto">
                <input type="file" name="fi-file-referencia" accept="image/*" style="font-size: 0.7rem;">
            </div>

            <textarea name="fi-text-message" rows="3" placeholder="Detalles adicionales..." required style="resize: none;"></textarea>

            <button type="submit" class="btn-enviar">ENVIAR DISEÑO</button>
        </form>
    </div>
</div>

</body>
</html>
