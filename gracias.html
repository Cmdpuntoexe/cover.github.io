<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Mensaje Recibido! - CStyles</title>
    <style>
        :root { --azul-cstyles: #2a75bb; --gold: #d4af37; --insta: #E1306C; }
        body {
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: #ffffff;
            height: 100vh;
            display: flex; justify-content: center; align-items: center; text-align: center;
        }
        .tarjeta-gracias {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); max-width: 400px; width: 90%;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            animation: fadeIn 1s ease;
        }

        /* ESTILO PARA EL LOGO */
        .logo-gracias {
            width: 140px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(42, 117, 187, 0.3));
        }

        .icono-exito { font-size: 40px; color: #25d366; margin-bottom: 10px; }
        h1 { font-size: 1.6rem; letter-spacing: 2px; margin-bottom: 10px; font-weight: 900; }
        p { color: #888; font-size: 0.85rem; line-height: 1.6; margin-bottom: 30px; }
        
        .btn-contenedor { display: flex; flex-direction: column; gap: 12px; }

        .btn-volver {
            background: var(--azul-cstyles); color: white; text-decoration: none;
            padding: 15px 30px; border-radius: 50px; font-weight: 900;
            font-size: 0.75rem; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-insta {
            background: transparent; color: white; text-decoration: none;
            padding: 13px 30px; border-radius: 50px; font-weight: 900;
            font-size: 0.75rem; letter-spacing: 2px; transition: 0.3s;
            border: 2px solid var(--insta);
        }
        .btn-volver:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(42, 117, 187, 0.4); }
        .btn-insta:hover { background: var(--insta); transform: scale(1.05); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="tarjeta-gracias">
        <!-- LOGO AÑADIDO -->
        <img src="/imajen2.png" alt="CStyles Logo" class="logo-gracias">
        
        <div class="icono-exito">✔</div>
        <h1>¡DISEÑO RECIBIDO!</h1>
        <p>Tu solicitud ha sido procesada con éxito. Revisaremos la foto de referencia y nos pondremos en contacto contigo.</p>
        
        <div class="btn-contenedor">
            <a href="/" class="btn-volver">VOLVER AL INICIO</a>
            <a href="https://instagram.com" target="_blank" class="btn-insta">VER TRABAJOS EN INSTAGRAM</a>
        </div>
    </div>

</body>
</html>
