<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Mensaje Recibido! - CStyles</title>
    <style>
        :root { --azul-cstyles: #2a75bb; --gold: #d4af37; }
        body {
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .tarjeta-gracias {
            background: rgba(255, 255, 255, 0.03);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            max-width: 400px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            animation: fadeIn 1s ease;
        }
        .icono-exito {
            font-size: 50px;
            color: #25d366;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 10px; }
        p { color: #888; font-size: 0.9rem; line-height: 1.6; margin-bottom: 30px; }
        
        .btn-volver {
            background: var(--azul-cstyles);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
            display: inline-block;
        }
        .btn-volver:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(42, 117, 187, 0.4); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="tarjeta-gracias">
        <div class="icono-exito">✔</div>
        <h1>¡DISEÑO RECIBIDO!</h1>
        <p>Hemos recibido tu información y la foto de referencia. Un asesor técnico revisará tu propuesta y te contactará muy pronto.</p>
        <a href="/" class="btn-volver">VOLVER AL INICIO</a>
    </div>

</body>
</html>
