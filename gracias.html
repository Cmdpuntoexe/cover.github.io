<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Mensaje Recibido! - CStyles</title>
    <style>
        :root { --azul-cstyles: #2a75bb; --gold: #d4af37; --insta: #E1306C; }
        body {
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: #ffffff;
            height: 100vh;
            display: flex; justify-content: center; align-items: center; text-align: center;
        }
        .tarjeta-gracias {
            background: rgba(255, 255, 255, 0.03);
            padding: 50px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); max-width: 400px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            animation: fadeIn 1s ease;
        }
        .icono-exito { font-size: 50px; color: #25d366; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 10px; font-weight: 900; }
        p { color: #888; font-size: 0.9rem; line-height: 1.6; margin-bottom: 30px; }
        
        .btn-contenedor { display: flex; flex-direction: column; gap: 15px; }

        .btn-volver {
            background: var(--azul-cstyles); color: white; text-decoration: none;
            padding: 15px 30px; border-radius: 50px; font-weight: 900;
            font-size: 0.8rem; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-insta {
            background: transparent; color: white; text-decoration: none;
            padding: 14px 30px; border-radius: 50px; font-weight: 900;
            font-size: 0.8rem; letter-spacing: 2px; transition: 0.3s;
            border: 2px solid var(--insta);
        }
        .btn-volver:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(42, 117, 187, 0.4); }
        .btn-insta:hover { background: var(--insta); transform: scale(1.05); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="tarjeta-gracias">
        <div class="icono-exito">✔</div>
        <h1>¡MENSAJE RECIBIDO!</h1>
        <p>Tu solicitud ha sido enviada con éxito. Un asesor técnico revisará tu diseño y te contactará a la brevedad.</p>
        
        <div class="btn-contenedor">
            <a href="/" class="btn-volver">VOLVER AL INICIO</a>
            <a href="https://instagram.com" target="_blank" class="btn-insta">SÍGUENOS EN INSTAGRAM 📸</a>
        </div>
    </div>

</body>
</html>
