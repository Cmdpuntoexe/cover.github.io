<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covering Styles - Inicio</title>
    <style>
        :root {
            --azul-cstyles: #2a75bb;
            --wa-green: #25d366;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                url('/Misxto2.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden; 
        }

        .marco-neon {
            border: 1px solid rgba(42, 117, 187, 0.5);
            padding: 40px 30px;
            border-radius: 4px;
            display: flex; flex-direction: column; align-items: center;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 85%;
            max-width: 550px;
            margin: 20px;
            animation: entradaMarco 1.2s ease-out forwards;
        }

        @keyframes entradaMarco {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .titulo-principal {
            color: var(--azul-cstyles);
            font-size: clamp(1.6rem, 7vw, 3rem);
            font-weight: 900;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin: 0;
            text-align: center;
            text-shadow: 0 0 20px rgba(42, 117, 187, 0.6);
        }

        /* TEXTO DESCRIPTIVO PEQUEÑO Y ELEGANTE */
        .texto-descripcion {
            color: #b8b8b8;
            font-size: 0.85rem;
            line-height: 1.6;
            margin: 25px 0;
            font-weight: 400;
            text-align: center;
            max-width: 90%;
        }

        .btn-contacto-nuevo {
            background: rgba(0,0,0,0.6);
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border: 1px solid var(--azul-cstyles);
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }

        .btn-contacto-nuevo:hover {
            background: var(--azul-cstyles);
            box-shadow: 0 0 25px var(--azul-cstyles);
            color: #000;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--wa-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--wa-green);
        }

        .link-catalogo {
            margin-top: 30px;
            color: #666;
            text-decoration: none;
            font-size: 0.7rem; letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.4s;
            border-bottom: 1px solid transparent;
            padding-bottom: 5px;
        }
        .link-catalogo:hover { color: #fff; border-color: var(--azul-cstyles); }

        @media (max-width: 600px) {
            .marco-neon { padding: 35px 20px; }
            .titulo-principal { letter-spacing: 5px; }
            .texto-descripcion { font-size: 0.75rem; line-height: 1.5; }
            .btn-contacto-nuevo { width: 100%; justify-content: center; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <div class="marco-neon">
        <h1 class="titulo-principal">Covering Styles</h1>
        
        <div class="texto-descripcion">
            Somos un emprendimiento dedicado a la protección y cuidado del interior de los vehículos. 
            Nos enfocamos en ofrecer soluciones prácticas para quienes usan su auto a diario y quieren mantenerlo en buen estado.
        </div>
        
        <a href="https://wa.me/961960385" class="btn-contacto-nuevo">
            <div class="status-dot"></div>
            CONTACTAR
        </a>

        <a href="/super-galeri20/" class="link-catalogo">VER CATÁLOGO DISEÑOS</a>
    </div>

</body>
</html>
