<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover22</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
}

/* HERO */
.hero{
    background:#111;
    color:white;
    padding:40px 20px;
    text-align:center;
}

.hero h1{
    margin:0;
    font-size:28px;
}

.hero p{
    margin-top:10px;
    color:#ccc;
}

/* BUSCADOR */
.buscador{
    max-width:600px;
    margin:20px auto;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* BENEFICIOS */
.beneficios{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:20px;
    flex-wrap:wrap;
}

.beneficio{
    background:white;
    padding:15px;
    border-radius:10px;
    width:200px;
    text-align:center;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    cursor:pointer;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.precio{
    color:#00a650;
    font-weight:bold;
}

/* BOTON WHATSAPP FLOTANTE */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:20px;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Fundas Premium para tu vehículo</h1>
    <p>Protege tus asientos • Fácil limpieza • Ajuste perfecto</p>
</div>

<div class="buscador">
    <input type="text" id="buscar" placeholder="Busca tu modelo...">
</div>

<div class="beneficios">
    <div class="beneficio">💧 Impermeables</div>
    <div class="beneficio">🧼 Fácil limpieza</div>
    <div class="beneficio">🚗 Ajuste perfecto</div>
</div>

<div class="grid" id="productos"></div>

<a class="whatsapp" href="https://wa.me/569XXXXXXXX" target="_blank">💬</a>

<script>

let productos = [];

fetch("https://opensheet.elk.sh/17PFyOZPS4v_IN93isNzWe4SdB6MzHPRHzr6vGa9sYWY/hoja%201")
.then(res => res.json())
.then(data => {
    console.log(data); // 👈 para probar

    productos = data;
    mostrarProductos(productos);
});

// BUSCADOR
document.getElementById("buscar").addEventListener("input", function(){
    let texto = this.value.toLowerCase();

    let filtrados = productos.filter(p => {
        let nombre = `${p.Marca || ""} ${p.Modelo || ""} ${p.Año || ""}`.toLowerCase();
        return nombre.includes(texto);
    });

    mostrarProductos(filtrados);
});

// MOSTRAR PRODUCTOS
function mostrarProductos(lista){
    let cont = document.getElementById("productos");
    cont.innerHTML = "";

    lista.slice(0,40).forEach(p => {

        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${p.Imagen || 'https://via.placeholder.com/300'}">
            <div class="info">
                <div>${p.Marca || ""} ${p.Modelo || ""} ${p.Año || ""}</div>
                <div class="precio">$${p.Precio || ""}</div>
            </div>
        `;

        card.onclick = () => {
            localStorage.setItem("producto", JSON.stringify(p));
            window.location.href = "producto.html";
        };

        cont.appendChild(card);
    });
}

</script>
</html>
