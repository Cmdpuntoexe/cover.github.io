<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covering Styles - Inicio</title>
    <style>
        :root {
            --azul-cstyles: #2a75bb;
            --wa-green: #25d366;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .contenedor-central {
            text-align: center;
            padding: 20px;
        }

        /* ANIMACIÓN DE ENTRADA DEL TÍTULO */
        .titulo-principal {
            color: var(--azul-cstyles);
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 20px rgba(42, 117, 187, 0.6);
            opacity: 0;
            filter: blur(10px);
            animation: entradaRevelado 2s cubic-bezier(0.2, 0, 0.2, 1) forwards;
        }

        @keyframes entradaRevelado {
            0% { opacity: 0; filter: blur(20px); letter-spacing: 30px; transform: scale(0.9); }
            100% { opacity: 1; filter: blur(0); letter-spacing: 12px; transform: scale(1); }
        }

        /* BOTÓN CON EFECTO DE PULSO */
        .btn-whatsapp-inicio {
            display: inline-block;
            margin-top: 50px;
            background: var(--wa-green);
            color: white;
            text-decoration: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
            text-transform: uppercase;
            opacity: 0;
            animation: aparecerBoton 1s ease 1.5s forwards, pulsoSutil 2s infinite 3s;
        }

        @keyframes aparecerBoton {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulsoSutil {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .btn-whatsapp-inicio:hover {
            transform: scale(1.05);
            background: #1ebd59;
        }

        /* ENLACE AL CATÁLOGO */
        .link-catalogo {
            position: fixed;
            bottom: 40px;
            color: #444;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 5px;
            transition: 0.5s;
            text-transform: uppercase;
            opacity: 0;
            animation: aparecerBoton 1s ease 2.5s forwards;
        }
        .link-catalogo:hover { 
            color: var(--azul-cstyles); 
            text-shadow: 0 0 10px var(--azul-cstyles);
        }

        @media (max-width: 768px) {
            .titulo-principal { font-size: 1.6rem; letter-spacing: 8px; }
            @keyframes entradaRevelado {
                0% { opacity: 0; filter: blur(15px); letter-spacing: 15px; }
                100% { opacity: 1; filter: blur(0); letter-spacing: 6px; }
            }
            .btn-whatsapp-inicio { padding: 15px 30px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="contenedor-central">
        <h1 class="titulo-principal">COVERING STYLES</h1>
        
        <a href="https://wa.me" class="btn-whatsapp-inicio">
            CONTACTAR EXPERTO 📱
        </a>
    </div>

    <!-- El botón para entrar sin WhatsApp -->
    <a href="/galeria/" class="link-catalogo">VER CATÁLOGO DISEÑOS</a>

</body>
</html>
