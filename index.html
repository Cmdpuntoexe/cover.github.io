<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover22</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
}

/* HEADER */
.header{
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}

/* BUSCADOR */
.buscador{
    max-width:600px;
    margin:20px auto;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* FILTRO */
.filtros{
    text-align:center;
    margin:20px;
}

button{
    margin:5px;
    padding:8px 15px;
    border:none;
    background:#ddd;
    border-radius:20px;
    cursor:pointer;
}

button:hover{
    background:#bbb;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    cursor:pointer;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.titulo{
    font-size:14px;
    font-weight:bold;
}

.precio{
    color:#00a650;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">COVER22</div>

<div class="buscador">
    <input type="text" id="buscar" placeholder="Buscar modelo...">
</div>

<div class="filtros" id="filtros"></div>

<div class="grid" id="productos"></div>

<script>

let productos = [];
let productosFiltrados = [];

fetch("hoja 1.json")
.then(res => res.json())
.then(data => {
    productos = data;
    productosFiltrados = data;
    crearFiltros();
    mostrarProductos(productosFiltrados);
});

// 🔎 BUSCADOR
document.getElementById("buscar").addEventListener("input", function(){
    let texto = this.value.toLowerCase();

    productosFiltrados = productos.filter(p => {
        let nombre = `${p.Marca} ${p.Modelo} ${p.Año}`.toLowerCase();
        return nombre.includes(texto);
    });

    mostrarProductos(productosFiltrados);
});

// 🎯 FILTROS POR MARCA
function crearFiltros(){
    let marcas = [...new Set(productos.map(p => p.Marca).filter(Boolean))];
    let cont = document.getElementById("filtros");

    marcas.forEach(marca => {
        let btn = document.createElement("button");
        btn.innerText = marca;

        btn.onclick = () => {
            productosFiltrados = productos.filter(p => p.Marca === marca);
            mostrarProductos(productosFiltrados);
        };

        cont.appendChild(btn);
    });
}

// 📦 MOSTRAR PRODUCTOS
function mostrarProductos(lista){
    let cont = document.getElementById("productos");
    cont.innerHTML = "";

    lista.slice(0,50).forEach(p => {

        let card = document.createElement("div");
        card.className = "card";

        let img = document.createElement("img");
        img.src = p.Imagen || "https://via.placeholder.com/300x200";

        let info = document.createElement("div");
        info.className = "info";

        let titulo = document.createElement("div");
        titulo.className = "titulo";
        titulo.innerText = `${p.Marca} ${p.Modelo} ${p.Año || ""}`;

        let precio = document.createElement("div");
        precio.className = "precio";
        precio.innerText = `$${p.Precio}`;

        info.appendChild(titulo);
        info.appendChild(precio);

        card.appendChild(img);
        card.appendChild(info);

        card.onclick = () => {
            localStorage.setItem("producto", JSON.stringify(p));
            window.location.href = "producto.html";
        };

        cont.appendChild(card);
    });
}

</script>

</body>
</html>
