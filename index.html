<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covering Styles - Inicio</title>
    <style>
        :root {
            --azul-cstyles: #2a75bb;
            --wa-green: #25d366; /* Lo usaremos solo para detalles */
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* MARCO NEÓN INTEGRADO */
        .marco-neon {
            border: 1px solid rgba(42, 117, 187, 0.3);
            padding: 60px 80px;
            border-radius: 2px; /* Esquinas más rectas para que se vea serio */
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 0 40px rgba(0,0,0,1), inset 0 0 20px rgba(42, 117, 187, 0.1);
            animation: entradaMarco 1.5s ease-out forwards;
            position: relative;
        }

        @keyframes entradaMarco {
            from { opacity: 0; width: 0%; border-color: transparent; }
            to { opacity: 1; width: auto; border-color: rgba(42, 117, 187, 0.5); }
        }

        .titulo-principal {
            color: var(--azul-cstyles);
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 20px rgba(42, 117, 187, 0.5);
            animation: reveal 2s ease-out;
        }

        @keyframes reveal {
            from { letter-spacing: 25px; filter: blur(10px); opacity: 0; }
            to { letter-spacing: 12px; filter: blur(0); opacity: 1; }
        }

        /* NUEVO BOTÓN QUE SÍ CUADRA (Estilo Fantasía Azul) */
        .btn-contacto-nuevo {
            margin-top: 45px;
            background: transparent;
            color: white;
            text-decoration: none;
            padding: 14px 40px;
            border: 1px solid var(--azul-cstyles);
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .btn-contacto-nuevo:hover {
            background: var(--azul-cstyles);
            box-shadow: 0 0 30px var(--azul-cstyles);
            color: #000; /* Letras negras al brillar para contraste */
        }

        /* Pequeño punto verde de "En línea" para indicar WhatsApp */
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--wa-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--wa-green);
        }

        .link-catalogo {
            position: fixed; bottom: 30px;
            color: #555; text-decoration: none;
            font-size: 0.7rem; letter-spacing: 4px;
            transition: 0.4s; text-transform: uppercase;
        }
        .link-catalogo:hover { color: var(--azul-cstyles); text-shadow: 0 0 10px var(--azul-cstyles); }

        @media (max-width: 768px) {
            .marco-neon { padding: 40px 20px; width: 85%; }
            .titulo-principal { font-size: 1.5rem; letter-spacing: 6px; }
            .btn-contacto-nuevo { font-size: 0.75rem; padding: 12px 25px; }
        }
    </style>
</head>
<body>

    <div class="marco-neon">
        <h1 class="titulo-principal">COVERING STYLES</h1>
        
        <a href="https://wa.me" class="btn-contacto-nuevo">
            <div class="status-dot"></div>
            CONTACTAR EXPERTO
        </a>
    </div>

    <a href="/galeria/" class="link-catalogo">VER CATÁLOGO DISEÑOS</a>

</body>
</html>
