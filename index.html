<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covering Styles - Inicio</title>
    <style>
        :root {
            --azul-cstyles: #2a75bb;
            --wa-green: #25d366;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* CUADRO AZUL PERIMETRAL (MARCO NEÓN) */
        .marco-neon {
            border: 2px solid var(--azul-cstyles);
            padding: 60px 80px;
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(42, 117, 187, 0.2), 
                        0 0 20px rgba(42, 117, 187, 0.2);
            animation: parpadeoMarco 4s infinite alternate;
            opacity: 0;
            transform: scale(1.1);
            animation: aparecerMarco 1.5s ease-out 0.5s forwards, parpadeoMarco 4s infinite 2s;
        }

        @keyframes aparecerMarco {
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes parpadeoMarco {
            0%, 100% { border-color: var(--azul-cstyles); box-shadow: 0 0 20px rgba(42, 117, 187, 0.2); }
            50% { border-color: #4a9eff; box-shadow: 0 0 40px rgba(42, 117, 187, 0.5); }
            52% { border-color: var(--azul-cstyles); }
            54% { border-color: #4a9eff; }
        }

        .contenedor-central {
            text-align: center;
        }

        /* ANIMACIÓN DE ENTRADA DEL TÍTULO */
        .titulo-principal {
            color: var(--azul-cstyles);
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 20px rgba(42, 117, 187, 0.6);
            opacity: 0;
            filter: blur(10px);
            animation: entradaRevelado 2s cubic-bezier(0.2, 0, 0.2, 1) 0.8s forwards;
        }

        @keyframes entradaRevelado {
            0% { opacity: 0; filter: blur(20px); letter-spacing: 30px; }
            100% { opacity: 1; filter: blur(0); letter-spacing: 12px; }
        }

        /* BOTÓN CON EFECTO DE PULSO */
        .btn-whatsapp-inicio {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 50px;
            background: var(--wa-green);
            color: white;
            text-decoration: none;
            padding: 16px 35px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
            text-transform: uppercase;
            opacity: 0;
            animation: aparecerBoton 1s ease 2s forwards, pulsoSutil 2s infinite 3s;
        }

        .logo-wa-small { font-size: 1.1rem; }

        @keyframes aparecerBoton {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulsoSutil {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .btn-whatsapp-inicio:hover {
            transform: scale(1.05);
            background: #1ebd59;
        }

        /* ENLACE AL CATÁLOGO */
        .link-catalogo {
            position: fixed;
            bottom: 40px;
            color: #444;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 4px;
            transition: 0.5s;
            text-transform: uppercase;
            opacity: 0;
            animation: aparecerBoton 1s ease 3s forwards;
        }
        .link-catalogo:hover { 
            color: var(--azul-cstyles); 
            text-shadow: 0 0 10px var(--azul-cstyles);
        }

        @media (max-width: 768px) {
            .marco-neon { padding: 40px 20px; width: 85%; }
            .titulo-principal { font-size: 1.6rem; letter-spacing: 8px; }
            .btn-whatsapp-inicio { padding: 14px 25px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="marco-neon">
        <div class="contenedor-central">
            <h1 class="titulo-principal">COVERING STYLES</h1>
            
            <a href="https://wa.me" class="btn-whatsapp-inicio">
                CONTACTAR EXPERTO <span class="logo-wa-small">📱</span>
            </a>
        </div>
    </div>

    <a href="/super-galeri20/" class="link-catalogo">VER CATÁLOGO DISEÑOS</a>

</body>
</html>
