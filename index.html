<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covering Styles - Inicio</title>
    <style>
        :root {
            --azul-cstyles: #2a75bb;
            --wa-green: #25d366;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            background: #000000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            /* Eliminamos overflow hidden para permitir deslizar */
            overflow-x: hidden; 
        }

        /* MARCO NEÓN CORREGIDO PARA MÓVIL */
        .marco-neon {
            border: 1px solid rgba(42, 117, 187, 0.5);
            padding: 50px 30px; /* Reducido para que quepa en teléfonos */
            border-radius: 4px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: inset 0 0 15px rgba(42, 117, 187, 0.1), 0 0 25px rgba(0,0,0,0.5);
            width: 85%; /* Asegura que no se salga de la pantalla */
            max-width: 600px;
            margin: 20px;
            animation: entradaMarco 1.2s ease-out forwards;
        }

        @keyframes entradaMarco {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .titulo-principal {
            color: var(--azul-cstyles);
            font-size: clamp(1.5rem, 8vw, 3.5rem); /* Ajuste automático de tamaño */
            font-weight: 900;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin: 0;
            text-align: center;
            text-shadow: 0 0 20px rgba(42, 117, 187, 0.5);
        }

        .btn-contacto-nuevo {
            margin-top: 40px;
            background: transparent;
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border: 1px solid var(--azul-cstyles);
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-contacto-nuevo:hover {
            background: var(--azul-cstyles);
            box-shadow: 0 0 20px var(--azul-cstyles);
            color: #000;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--wa-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--wa-green);
        }

        .link-catalogo {
            margin-top: 40px;
            color: #666; text-decoration: none;
            font-size: 0.7rem; letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.4s;
            border-bottom: 1px solid transparent;
            padding-bottom: 5px;
        }
        .link-catalogo:hover { color: #fff; border-color: var(--azul-cstyles); }

        @media (max-width: 600px) {
            .marco-neon { padding: 40px 15px; }
            .titulo-principal { letter-spacing: 5px; }
            .btn-contacto-nuevo { width: 100%; justify-content: center; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <div class="marco-neon">
        <h1 class="titulo-principal">COVERING STYLES</h1>
        
        <a href="https://wa.me" class="btn-contacto-nuevo">
            <div class="status-dot"></div>
            CONTACTAR EXPERTO
        </a>

        <a href="/galeria/" class="link-catalogo">VER CATÁLOGO DISEÑOS</a>
    </div>

</body>
</html>
