
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consulta tu modelo</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #ffffff;
    color: #111;
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 450px;
    text-align: center;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
}

h2 {
    margin-bottom: 10px;
}

p {
    color: #666;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.resultado {
    margin-top: 20px;
    font-size: 16px;
    font-weight: 500;
}

.disponible {
    color: #1db954;
}

.no-disponible {
    color: #e63946;
}

.lista {
    margin-top: 10px;
    text-align: left;
    background: #f9f9f9;
    border-radius: 10px;
    max-height: 150px;
    overflow-y: auto;
}

.item {
    padding: 10px;
    cursor: pointer;
}

.item:hover {
    background: #eee;
}

.btn {
    margin-top: 20px;
    display: none;
    padding: 12px;
    background: black;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    display: inline-block;
}
</style>
</head>

<body>

<div class="box">
    <h2>Encuentra tu modelo</h2>
    <p>Consulta si tenemos fundas disponibles para tu vehículo</p>

    <input type="text" id="input" placeholder="Ej: Toyota Corolla">

    <div class="lista" id="lista"></div>
    <div class="resultado" id="resultado"></div>

    <a id="whatsappBtn" class="btn" target="_blank">
        Consultar por WhatsApp
    </a>
</div>

    <script>
let data = [];

fetch('productos.json')
  .then(res => res.json())
  .then(json => {
    data = json;
    cargarMarcas();
  });

const marcaSelect = document.getElementById("marca");
const modeloSelect = document.getElementById("modelo");
const resultado = document.getElementById("resultado");

function cargarMarcas() {
  let marcas = [...new Set(data.map(p => p.marca))];

  marcas.forEach(marca => {
    let option = document.createElement("option");
    option.value = marca;
    option.textContent = marca.toUpperCase();
    marcaSelect.appendChild(option);
  });
}

marcaSelect.addEventListener("change", () => {
  let marca = marcaSelect.value;

  modeloSelect.innerHTML = '<option value="">Selecciona modelo</option>';
  resultado.innerHTML = "";

  let modelos = data.filter(p => p.marca === marca);

  modelos.forEach(p => {
    let option = document.createElement("option");
    option.value = p.modelo;
    option.textContent = p.modelo;
    modeloSelect.appendChild(option);
  });

  modeloSelect.disabled = false;
});

modeloSelect.addEventListener("change", () => {
  let marca = marcaSelect.value;
  let modelo = modeloSelect.value;

  let producto = data.find(p => p.marca === marca && p.modelo === modelo);

  resultado.innerHTML = `
    <div class="card">
      <img src="img/${producto.imagen}">
      <h3>${marca.toUpperCase()} ${modelo}</h3>
      <div class="precio">$${producto.precio}</div>

      <a class="btn" target="_blank"
      href="https://wa.me/569XXXXXXXX?text=Hola,%20quiero%20fundas%20para%20${marca}%20${modelo}">
      Comprar / Consultar
      </a>
    </div>
  `;
});
</script>
