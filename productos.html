
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consulta tu modelo</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #ffffff;
    color: #111;
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 450px;
    text-align: center;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
}

h2 {
    margin-bottom: 10px;
}

p {
    color: #666;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.resultado {
    margin-top: 20px;
    font-size: 16px;
    font-weight: 500;
}

.disponible {
    color: #1db954;
}

.no-disponible {
    color: #e63946;
}

.lista {
    margin-top: 10px;
    text-align: left;
    background: #f9f9f9;
    border-radius: 10px;
    max-height: 150px;
    overflow-y: auto;
}

.item {
    padding: 10px;
    cursor: pointer;
}

.item:hover {
    background: #eee;
}

.btn {
    margin-top: 20px;
    display: none;
    padding: 12px;
    background: black;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    display: inline-block;
}
</style>
</head>

<body>

<div class="box">
    <h2>Encuentra tu modelo</h2>
    <p>Consulta si tenemos fundas disponibles para tu vehículo</p>

    <input type="text" id="input" placeholder="Ej: Toyota Corolla">

    <div class="lista" id="lista"></div>
    <div class="resultado" id="resultado"></div>

    <a id="whatsappBtn" class="btn" target="_blank">
        Consultar por WhatsApp
    </a>
</div>

<script>
const modelos = [
    "toyota corolla",
    "toyota hilux",
    "chevrolet aveo",
    "chevrolet spark",
    "hyundai accent",
    "kia rio",
    "nissan versa",
    "mazda 3",
    "ford ranger",
    "volkswagen gol"
];

const input = document.getElementById("input");
const lista = document.getElementById("lista");
const resultado = document.getElementById("resultado");
const whatsappBtn = document.getElementById("whatsappBtn");

input.addEventListener("input", () => {
    let valor = input.value.toLowerCase();
    lista.innerHTML = "";

    if (valor === "") return;

    let filtrados = modelos.filter(m => m.includes(valor));

    filtrados.forEach(m => {
        let div = document.createElement("div");
        div.classList.add("item");
        div.textContent = m;
        div.onclick = () => seleccionarModelo(m);
        lista.appendChild(div);
    });
});

function seleccionarModelo(modelo) {
    input.value = modelo;
    lista.innerHTML = "";

    resultado.innerHTML = "✅ Disponible para tu vehículo";
    resultado.className = "resultado disponible";

    whatsappBtn.style.display = "inline-block";
    whatsappBtn.href = `https://wa.me/569XXXXXXXX?text=Hola,%20quiero%20fundas%20para%20${modelo}`;
}
</script>

</body>
</html>
