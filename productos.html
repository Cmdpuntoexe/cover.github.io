<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Buscar modelo - Cover22</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
    padding: 50px;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
}

button {
    padding: 10px 20px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}

#resultado {
    margin-top: 20px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="box">
    <h2>Busca tu modelo</h2>
    <input type="text" id="modelo" placeholder="Ej: Sail 2017">
    <br>
    <button onclick="buscar()">Ver disponibilidad</button>

    <div id="resultado"></div>
</div>

<script>

// 🔥 BASE DE DATOS (después la conectamos a Excel)
const productos = {
    "sail 2017": "sail.html",
    "accent": "accent.html",
    "toyota yaris": "yaris.html"
};

function buscar() {
    let modelo = document.getElementById("modelo").value.toLowerCase();
    let resultado = document.getElementById("resultado");

    if(productos[modelo]) {
        resultado.innerHTML = "✅ Disponible, redirigiendo...";
        
        setTimeout(() => {
            window.location.href = productos[modelo];
        }, 1000);

    } else {
        resultado.innerHTML = "❌ No disponible";
    }
}

</script>

</body>
</html>
