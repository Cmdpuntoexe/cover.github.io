
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cover22 - Fundas de Auto</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}

/* HEADER */
.header{
  background:#111;
  color:white;
  padding:20px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

/* BUSCADOR */
.buscador{
  padding:20px;
  text-align:center;
  background:white;
}

input{
  width:80%;
  max-width:400px;
  padding:10px;
  border-radius:5px;
  border:1px solid #ccc;
}

/* FILTROS */
.filtros{
  text-align:center;
  padding:10px;
}

.filtros button{
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#ddd;
  cursor:pointer;
}

.filtros button:hover{
  background:#111;
  color:white;
}

/* CATALOGO */
#catalogo{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-body{
  padding:15px;
}

.precio{
  font-weight:bold;
  font-size:18px;
}

.btn{
  display:block;
  text-align:center;
  background:#25D366;
  color:white;
  padding:10px;
  border-radius:5px;
  text-decoration:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  COVER22 - Fundas de Auto
</div>

<div class="buscador">
  <input type="text" id="buscar" placeholder="Busca tu modelo...">
</div>

<div class="filtros" id="filtros"></div>

<div id="catalogo"></div>

<script>
const URL = "https://opensheet.elk.sh/17PFyOZPS4v_iN93isNzWe4SdB6MzHPRHzr6vGa9sYWY/hoja 1";

let datosGlobal = [];

fetch(URL)
.then(res => res.json())
.then(data => {
  datosGlobal = data;
  mostrar(data);
  crearFiltros(data);
});

/* MOSTRAR PRODUCTOS */
function mostrar(data){
  const contenedor = document.getElementById("catalogo");
  contenedor.innerHTML = "";

  data.forEach(item => {
    contenedor.innerHTML += `
      <div class="card">
        <img src="${item.Imagen || 'https://via.placeholder.com/300'}">
        <div class="card-body">
          <h3>${item.Marca || ''} ${item.Modelo || ''}</h3>
          <p>Año: ${item.Año || ''}</p>
          <p class="precio">$${item.Precio || 'Consultar'}</p>
          <a class="btn" href="https://wa.me/569XXXXXXXX?text=Hola quiero el modelo ${item.Modelo}" target="_blank">
            Consultar
          </a>
        </div>
      </div>
    `;
  });
}

/* BUSCADOR */
document.getElementById("buscar").addEventListener("input", e=>{
  const texto = e.target.value.toLowerCase();
  const filtrados = datosGlobal.filter(item =>
    (item.Modelo || '').toLowerCase().includes(texto)
  );
  mostrar(filtrados);
});

/* FILTROS POR MARCA */
function crearFiltros(data){
  const marcas = [...new Set(data.map(item => item.Marca))];
  const contenedor = document.getElementById("filtros");

  marcas.forEach(marca => {
    contenedor.innerHTML += `<button onclick="filtrar('${marca}')">${marca}</button>`;
  });
}

function filtrar(marca){
  const filtrados = datosGlobal.filter(item => item.Marca === marca);
  mostrar(filtrados);
}
</script>

</body>
</html>
</script>
