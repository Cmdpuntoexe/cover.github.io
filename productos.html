
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consulta tu modelo</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #ffffff;
    color: #111;
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 450px;
    text-align: center;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
}

h2 {
    margin-bottom: 10px;
}

p {
    color: #666;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.resultado {
    margin-top: 20px;
    font-size: 16px;
    font-weight: 500;
}

.disponible {
    color: #1db954;
}

.no-disponible {
    color: #e63946;
}

.lista {
    margin-top: 10px;
    text-align: left;
    background: #f9f9f9;
    border-radius: 10px;
    max-height: 150px;
    overflow-y: auto;
}

.item {
    padding: 10px;
    cursor: pointer;
}

.item:hover {
    background: #eee;
}

.btn {
    margin-top: 20px;
    display: none;
    padding: 12px;
    background: black;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    display: inline-block;
}
</style>
</head>

<body>

<div class="box">
    <h2>Encuentra tu modelo</h2>
    <p>Consulta si tenemos fundas disponibles para tu vehículo</p>

    <input type="text" id="input" placeholder="Ej: Toyota Corolla">

    <div class="lista" id="lista"></div>
    <div class="resultado" id="resultado"></div>

    <a id="whatsappBtn" class="btn" target="_blank">
        Consultar por WhatsApp
    </a>
</div>

    <div class="catalogo">

<h2>Encuentra fundas para tu vehículo</h2>

<select id="marca">
  <option value="">Selecciona marca</option>
</select>

<select id="modelo" disabled>
  <option value="">Selecciona modelo</option>
</select>

<div id="resultado" class="resultado-box"></div>

</div>

<style>
.catalogo {
  background: #fff;
  padding: 40px;
  border-radius: 20px;
  max-width: 500px;
  margin: auto;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.resultado-box {
  margin-top: 25px;
}

.card {
  border: 1px solid #eee;
  padding: 20px;
  border-radius: 15px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.precio {
  font-size: 20px;
  font-weight: bold;
  margin-top: 10px;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px;
  background: black;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}
</style>

<script>
// 🔥 DATA COMPLETA (puedes ampliarla con tu Excel)
const data = {
  toyota: {
    corolla: { precio: 135000 },
    hilux: { precio: 145000 }
  },
  chevrolet: {
    sail: { precio: 120000 },
    spark: { precio: 115000 }
  },
  kia: {
    rio: { precio: 125000 }
  }
};

const marcaSelect = document.getElementById("marca");
const modeloSelect = document.getElementById("modelo");
const resultado = document.getElementById("resultado");

// cargar marcas
for (let marca in data) {
  let option = document.createElement("option");
  option.value = marca;
  option.textContent = marca.toUpperCase();
  marcaSelect.appendChild(option);
}

// seleccionar marca
marcaSelect.addEventListener("change", () => {
  let marca = marcaSelect.value;

  modeloSelect.innerHTML = '<option value="">Selecciona modelo</option>';
  resultado.innerHTML = "";

  if (!marca) {
    modeloSelect.disabled = true;
    return;
  }

  modeloSelect.disabled = false;

  for (let modelo in data[marca]) {
    let option = document.createElement("option");
    option.value = modelo;
    option.textContent = modelo;
    modeloSelect.appendChild(option);
  }
});

// seleccionar modelo
modeloSelect.addEventListener("change", () => {
  let marca = marcaSelect.value;
  let modelo = modeloSelect.value;

  if (!modelo) return;

  let producto = data[marca][modelo];

  let imagen = `img/${marca}-${modelo}.jpg`;

  resultado.innerHTML = `
    <div class="card">
      <img src="${imagen}" onerror="this.src='img/default.jpg'">
      <h3>${marca.toUpperCase()} ${modelo}</h3>
      <p>Protección total para tus asientos</p>
      <div class="precio">$${producto.precio}</div>

      <a class="btn" target="_blank"
      href="https://wa.me/569XXXXXXXX?text=Hola,%20quiero%20fundas%20para%20${marca}%20${modelo}">
      Comprar / Consultar
      </a>
    </div>
  `;
});
</script>
