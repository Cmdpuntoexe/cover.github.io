<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>COVER22 - Fundas de Auto</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* HEADER */
.header {
    background: #1f1f1f;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

/* BUSCADOR */
.search-box {
    margin: 30px auto;
    width: 80%;
    max-width: 500px;
}

.search-box input {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    outline: none;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

/* PRODUCTOS */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.card-title {
    font-size: 18px;
    font-weight: bold;
}

.price {
    color: green;
    font-size: 16px;
    margin-top: 10px;
}

.btn {
    margin-top: 15px;
    display: inline-block;
    padding: 10px 15px;
    background: #000;
    color: white;
    border-radius: 20px;
    text-decoration: none;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
    COVER22 - Fundas de Auto
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Busca tu modelo...">
</div>

<div class="container" id="productos">
</div>

<script>
let data = [];

// AQUÍ CONECTAS TU JSON DEL EXCEL
fetch("hhttps://opensheet.elk.sh/17PFyOZPS4v_IN93isNzWe4SdB6MzHPRHzr6vGa9sYWY/hoja 1")
.then(res => res.json())
.then(json => {
    data = json;
    mostrarProductos(data);
});

function mostrarProductos(lista){
    let cont = document.getElementById("productos");
    cont.innerHTML = "";

    lista.forEach(item => {
        cont.innerHTML += `
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="">
            <div class="card-content">
                <div class="card-title">${item.Modelo} ${item.Año}</div>
                <div class="price">$135.000</div>
                <a class="btn" href="https://wa.me/569XXXXXXXX?text=Hola quiero funda para ${item.Modelo} ${item.Año}">Comprar</a>
            </div>
        </div>
        `;
    });
}

// BUSCADOR
document.getElementById("search").addEventListener("keyup", function(){
    let texto = this.value.toLowerCase();
    let filtrado = data.filter(item =>
        item.Modelo.toLowerCase().includes(texto)
    );
    mostrarProductos(filtrado);
});
</script>

</body>
</html>
