<script>
    const miNumero = "56961960385";
    
    // AQUÍ ESTÁN TUS DESCRIPCIONES ORIGINALES COMPLETAS
    const telas = [
        { 
            ref: "TELA-01", 
            fotos: [
                { ruta: "/mixto1.jpg", desc: "Diseño Mixto (Policuero-Genero): Tela Automotriz en la parte central de la funda con un corte horizontal y dos lineas Ligeramente arqueadas en la pieza inferior." }
            ] 
        }, 
        { 
            ref: "TELA-02", 
            fotos: [
                { ruta: "/Misxto2.jpg", desc: "Diseño Mixto (Policuero-Genero): Tela Automotriz en todo el frente con un corte en el area central y cuatro lineas horizontales en la pieza inferior." },
                { ruta: "/mixto3.jpg", desc: "Diseño Mixto (Policuero-Genero): Tela Automotriz en la parte central de la funda con un corte horizontal" }
            ] 
        },
        { 
            ref: "TELA-03", 
            fotos: [
                { ruta: "/tela3.jpg", desc: "100% Genero automotriz bicolor : Pieza central con corte horizontal." },
                { ruta: "/tela1.jpg", desc: "100% Genero automotriz bitono: Pieza central sin cortes y con diseño tipo diamante." },
                { ruta: "/tela2.jpg", desc: "100% Genero automotriz tricolor : Pieza central con corte horizontal." }
            ] 
        },
        { 
            ref: "TELA-04", 
            fotos: [
                { ruta: "/mixto8.jpg", desc: "Diseño Mixto (Policuero-Genero): Pieza cental con corte horizontal, laterales en policuero beige. -bordes y tapas en negro" }
            ] 
        },
        { 
            ref: "TELA-05", 
            fotos: [
                { ruta: "/mixto4.jpg", desc: "Diseño mixto (Policuero-Genero): Tela Automotriz en todo el frente con un corte en el area central y costura doble vertical en la pieza inferio. Pieza central superior con dos cortes en vertical." }
            ] 
        },
        { 
            ref: "TELA-06", 
            fotos: [
                { ruta: "/mixto5.jpg", desc: "Diseño Mixto (Policuero-Genero): Pieza cental con corte horizontal, -Asiento en policuero con pieza central con corte Horizontal y costura en flecha. -Espaldar con pieza central y corte horizontal mas genero en pieza inferior." }
            ] 
        }
    ];

    let telaActual = 0;
    let fotoActual = 0;
    const contenedor = document.getElementById("contenedorTelas");

    // Generar la galería
    telas.forEach((t, index) => {
        const div = document.createElement("div");
        div.className = "contenedor-foto";
        div.onclick = () => abrirModal(index);
        
        // Usamos la primera foto de cada grupo para la miniatura
        const img = document.createElement("img");
        img.src = t.fotos[0].ruta;
        img.className = "foto-item";
        
        const tag = document.createElement("div");
        tag.className = "ref-tag";
        tag.innerText = t.ref;
        
        div.appendChild(img);
        div.appendChild(tag);
        contenedor.appendChild(div);
    });

    function abrirModal(index) {
        telaActual = index;
        fotoActual = 0;
        actualizarModal();
        document.getElementById("modalImg").style.display = "flex";
    }

    function cambiarFoto(dir) {
        const f = telas[telaActual].fotos;
        fotoActual = (fotoActual + dir + f.length) % f.length;
        actualizarModal();
    }

    function actualizarModal() {
        const t = telas[telaActual];
        const v = t.fotos[fotoActual];
        
        document.getElementById("imgGrande").src = v.ruta;
        document.getElementById("modalRef").innerText = t.ref + " - OPCIÓN " + (fotoActual + 1);
        document.getElementById("descVariante").innerText = v.desc;
        
        // El mensaje de WhatsApp ahora incluye la descripción técnica completa
        const msg = encodeURIComponent("Hola CStyles, consulto por " + t.ref + " (Opción " + (fotoActual + 1) + "): " + v.desc);
        document.getElementById("waLinkModal").href = "https://whatsapp.com" + miNumero + "&text=" + msg;
        
        // Mostrar flechas solo si hay más de una foto
        const btns = document.querySelectorAll('.btn-nav');
        btns.forEach(b => b.style.display = t.fotos.length > 1 ? 'block' : 'none');
    }

    function cerrarVista() { 
        document.getElementById("modalImg").style.display = "none"; 
    }

    // Cerrar al hacer clic fuera de la imagen
    window.onclick = function(e) { 
        if(e.target == document.getElementById("modalImg")) cerrarVista(); 
    }
</script>
